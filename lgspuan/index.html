<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGS Puan Hesaplama</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #141e30, #243b55, #0f2027, #203a43);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            padding: 2rem;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 800px;
            z-index: 10;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-weight: 700;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }

        th, td {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #4facfe;
            text-transform: uppercase;
        }

        .ders-adi {
            text-align: left;
            font-weight: 600;
            font-size: 1.1rem;
        }

        input[type="number"] {
            width: 70px;
            padding: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: #4facfe;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
            background: rgba(0, 0, 0, 0.4);
        }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .net-skor {
            font-weight: bold;
            font-size: 1.2rem;
            color: #00f2fe;
            text-shadow: 0 0 5px rgba(0, 242, 254, 0.5);
        }

        /* Yeni Buton Tasarımı */
        .buton-alani {
            text-align: center;
            margin-bottom: 2rem;
        }

        button {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 242, 254, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            color: #aaa;
            box-shadow: none;
        }

        .sonuc-alani {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }

        .sonuc-kutu {
            text-align: center;
            flex: 1;
            min-width: 200px;
        }

        .sonuc-kutu span {
            display: block;
            font-size: 1rem;
            color: #d1d1d1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .sonuc-deger {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            min-height: 50px;
        }

        .puan-deger {
            color: #4facfe;
            text-shadow: 0 0 15px rgba(79, 172, 254, 0.6);
        }

        @media (max-width: 768px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 1.8rem; }
            th, td { padding: 0.5rem; font-size: 0.9rem; }
            input[type="number"] { width: 50px; font-size: 1rem; }
            .sonuc-deger { font-size: 2rem; }
            button { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LGS Puan Hesaplama</h1>
        
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: left;">Dersler</th>
                        <th>Soru</th>
                        <th>Doğru</th>
                        <th>Yanlış</th>
                        <th>Net</th>
                    </tr>
                </thead>
                <tbody id="hesap-tablosu">
                    </tbody>
            </table>
        </div>

        <div class="buton-alani">
            <button id="hesapla-btn" onclick="bekleVeHesapla()">Hesapla</button>
        </div>

        <div class="sonuc-alani">
            <div class="sonuc-kutu">
                <span>Toplam Net</span>
                <div class="sonuc-deger" id="toplam-net">0.00</div>
            </div>
            <div class="sonuc-kutu">
                <span>Tahmini LGS Puanı</span>
                <div class="sonuc-deger puan-deger" id="toplam-puan">194.76</div>
            </div>
        </div>
    </div>

    <script>

        const lgsVerileri = {
            turkce: { ad: "Türkçe", soru: 20, katsayi: 4.33 },
            inkilap: { ad: "T.C. İnkılap Tarihi", soru: 10, katsayi: 1.68 },
            din: { ad: "Din Kültürü", soru: 10, katsayi: 1.68 },
            ingilizce: { ad: "Yabancı Dil", soru: 10, katsayi: 1.68 },
            matematik: { ad: "Matematik", soru: 20, katsayi: 4.33 },
            fen: { ad: "Fen Bilimleri", soru: 20, katsayi: 4.33 }
        };
        const TABAN_PUAN = 194.76;
        const tabloGövdesi = document.getElementById('hesap-tablosu');

        for (const [key, ders] of Object.entries(lgsVerileri)) {
            const tr = document.createElement('tr');
            tr.innerHTML = `

                <td class="ders-adi">${ders.ad}</td>
                <td>${ders.soru}</td>
                <td><input type="number" id="${key}-d" min="0" max="${ders.soru}" value="" oninput="hesapla()"></td>
                <td><input type="number" id="${key}-y" min="0" max="${ders.soru}" value="" oninput="hesapla()"></td>
                <td class="net-skor" id="${key}-net"></td>
            `;

            tabloGövdesi.appendChild(tr);
        }

        // 2 Saniyelik Bekleme ve Animasyon Fonksiyonu
        function bekleVeHesapla() {
            const btn = document.getElementById('hesapla-btn');
            
            // Butonu kilitle ve yazıyı değiştir
            btn.disabled = true;
            btn.innerText = "Hesaplanıyor ./../...";

            // Sonuçları bekleme moduna al
            document.getElementById('toplam-net').innerText = "...";
            document.getElementById('toplam-puan').innerText = "...";
            
            for (const key of Object.keys(lgsVerileri)) {
                document.getElementById(`${key}-net`).innerText = "...";
            }

            // 2 Saniye (2000 milisaniye) sonra asıl hesabı yap
            setTimeout(() => {
                gercekHesaplama();
                
                // Butonu eski haline getir
                btn.disabled = false;
                btn.innerText = "Hesapla";
            }, 2000);
        }

        // Asıl Matematiksel Hesaplama İşlemleri
        function gercekHesaplama() {
            let genelToplamNet = 0;
            let genelToplamPuan = TABAN_PUAN;

            for (const [key, ders] of Object.entries(lgsVerileri)) {
                const dogruInput = document.getElementById(`${key}-d`);
                const yanlisInput = document.getElementById(`${key}-y`);
                const netGosterge = document.getElementById(`${key}-net`);

                let dogru = parseInt(dogruInput.value) || 0;
                let yanlis = parseInt(yanlisInput.value) || 0;

                // Sınır kontrolleri
                if (dogru < 0) { dogru = 0; dogruInput.value = 0; }
                if (yanlis < 0) { yanlis = 0; yanlisInput.value = 0; }
                
                if (dogru + yanlis > ders.soru) {
                    // Eğer toplam sınır aşılırsa yanlışı öncelikli kabul edip doğruyu düzeltelim
                    dogru = ders.soru - yanlis;
                    if(dogru < 0) { dogru = 0; yanlis = ders.soru; }
                    dogruInput.value = dogru;
                    yanlisInput.value = yanlis;
                }

                // Net Hesaplama (3 Yanlış 1 Doğru)
                let net = dogru - (yanlis / 3);
                if (net < 0) net = 0; 
                
                netGosterge.innerText = net.toFixed(2);
                
                genelToplamNet += net;
                genelToplamPuan += (net * ders.katsayi);
            }

            if (genelToplamPuan > 500) genelToplamPuan = 500;

            document.getElementById('toplam-net').innerText = genelToplamNet.toFixed(2);
            document.getElementById('toplam-puan').innerText = genelToplamPuan.toFixed(2);
        }
    </script>
</body>
</html>
