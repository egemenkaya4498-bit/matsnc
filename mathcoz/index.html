<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATH CANAVARI · KAYA STUDIOS AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
    onload="katexReady=true"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-dark: #0a0c10;
      --primary: #00f0ff;
      --primary-glow: rgba(0, 240, 255, 0.4);
      --secondary: #a020f0;
      --secondary-glow: rgba(160, 32, 240, 0.4);
      --glass-bg: rgba(20, 30, 45, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #eef5ff;
      --text-muted: #9aaec9;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      overflow: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    * { scrollbar-width: thin; scrollbar-color: var(--primary) transparent; }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ══════════════════════ SIDEBAR ══════════════════════ */
    #sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--glass-bg);
      border-right: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 20px;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
    }

    .brand-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 8px;
      color: var(--primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.78rem;
    }

    #new-chat-btn {
      background: linear-gradient(135deg, #a020f0, #b060f0);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 8px 20px var(--secondary-glow);
      letter-spacing: 0.5px;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    #new-chat-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px var(--secondary-glow);
    }

    #history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      backdrop-filter: blur(5px);
      color: var(--text-muted);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .history-item:hover {
      background: rgba(0,240,255,0.07);
      border-color: rgba(0,240,255,0.35);
      color: #cde8ff;
      transform: translateX(4px);
    }
    .history-item.active {
      background: rgba(0,240,255,0.12);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 0 12px rgba(0,240,255,0.25);
      transform: none;
    }
    .history-item .chat-icon {
      opacity: 0.55;
      font-size: 0.78rem;
      flex-shrink: 0;
    }
    .history-item .chat-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-item .naming-spinner {
      font-size: 0.65rem;
      color: var(--primary);
      opacity: 0.7;
      flex-shrink: 0;
    }
    .history-item .delete-btn {
      display: none;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      border-radius: 8px;
      width: 26px;
      height: 26px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 0.75rem;
      transition: all 0.15s;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }
    .history-item:hover .delete-btn,
    .history-item.active .delete-btn {
      display: flex;
    }
    .history-item .delete-btn:hover {
      background: rgba(255,60,60,0.25);
      color: #ff8888;
      border-color: rgba(255,60,60,0.5);
    }
    .history-item .delete-btn.confirm {
      background: rgba(255,60,60,0.3);
      color: #ff8888;
      border-color: rgba(255,60,60,0.6);
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 14px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* ══════════════════════ CHAT MAIN ══════════════════════ */
    #chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: rgba(0,0,0,0.2);
      position: relative;
      z-index: 2;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 30px 10%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── MESSAGES ── */
    .msg-wrap {
      display: flex;
    }
    .msg-wrap.user { justify-content: flex-end; }
    .msg-wrap.ai   { justify-content: flex-start; }

    .msg {
      max-width: 75%;
      padding: 18px 24px;
      line-height: 1.65;
      font-size: 1rem;
      word-wrap: break-word;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      animation: msgPop 0.3s ease;
    }
    .msg.user {
      border-radius: 28px 28px 8px 28px;
      background: linear-gradient(135deg, #a020f0, #8a2be2);
      box-shadow: 0 0 25px rgba(160,32,240,0.5);
      border-color: rgba(255,255,255,0.15);
    }
    .msg.ai {
      border-radius: 28px 28px 28px 8px;
      background: rgba(20, 30, 45, 0.7);
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(0,240,255,0.25);
    }
    .msg.error {
      background: rgba(255,50,50,0.18);
      border-color: #ff4d4d;
      box-shadow: 0 0 15px rgba(255,77,77,0.3);
      color: #ffb3b3;
    }

    /* ── TYPING INDICATOR ── */
    #typing-indicator {
      align-self: flex-start;
      display: none;
      gap: 6px;
      padding: 18px 24px;
      background: var(--glass-bg);
      border-radius: 28px 28px 28px 8px;
      border: 1px solid var(--primary);
      box-shadow: 0 0 20px var(--primary-glow);
      width: fit-content;
    }
    #typing-indicator.show { display: flex; }
    #typing-indicator span {
      display: block;
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0,240,255,0.6);
      animation: bounce 1.4s infinite ease-in-out;
    }
    #typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    #typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    /* ── INPUT PANEL ── */
    #input-panel {
      padding: 20px 10%;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      flex-shrink: 0;
    }

    .input-wrapper {
      background: rgba(10,15,25,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 60px;
      padding: 8px 8px 8px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 30px var(--primary-glow);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 1.05rem;
      padding: 14px 0;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    #user-input::placeholder { color: var(--text-muted); font-weight: 300; }
    #user-input:disabled { opacity: 0.6; }

    #send-btn {
      background: linear-gradient(145deg, #00f0ff, #00b8ff);
      border: none;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 20px var(--primary-glow);
      color: #0a0c10;
      font-size: 1.3rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) {
      transform: scale(1.07) rotate(5deg);
      box-shadow: 0 0 35px var(--primary-glow);
    }
    #send-btn:disabled {
      background: rgba(0,240,255,0.3);
      cursor: not-allowed;
      box-shadow: none;
    }

    .input-footer {
      text-align: center;
      margin-top: 10px;
      font-size: 0.72rem;
      color: rgba(154,174,201,0.5);
      letter-spacing: 0.3px;
    }

    /* ── ANIMATIONS ── */
    @keyframes msgPop {
      0%   { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-12px); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .fa-spin-custom {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    /* ── KaTeX ── */
    .katex { font-size: 1.1em; }
    .katex-display { overflow-x: auto; margin: 12px 0; }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="brand-badge">
        <i class="fas fa-crown"></i> KAYA STUDIOS · PLUS
      </div>
      <button id="new-chat-btn">
        <i class="fas fa-plus-circle"></i> YENİ SOHBET
      </button>
      <div id="history-list"></div>
      <div class="sidebar-footer">
        <i class="fas fa-robot"></i> MATH CANAVARI v2.0
      </div>
    </div>

    <!-- CHAT -->
    <div id="chat-main">
      <div id="chat-box">
        <div id="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div id="input-panel">
        <div class="input-wrapper">
          <input type="text" id="user-input"
            placeholder="Matematik sorusu sor, denklem yaz... (LaTeX destekler)"
            autofocus>
          <button id="send-btn">
            <i class="fas fa-paper-plane" id="send-icon"></i>
          </button>
        </div>
        <p class="input-footer">
          <i class="fas fa-shield-halved"></i>
          Kaya Studios AI · Math Canavarı — Powered by Gemini
        </p>
      </div>
    </div>
  </div>

  <script>
  // ═══════════════════════════════════════════════════════
  //  MATH CANAVARI — Tüm JS (CSS inline, sıfır bağımlılık)
  // ═══════════════════════════════════════════════════════

  const API_URL = 'https://serverai-wtpr.onrender.com/chat';

  let katexReady = false; // KaTeX auto-render flag (window'dan da okunur)

  // ── Yardımcı: localStorage ──────────────────────────────
  function loadChats() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveChats(chats) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
  }

  // ── Durum ───────────────────────────────────────────────
  let chats = loadChats();
  let currentChatId = null;
  let isWaiting = false;
  let confirmDeleteId = null;
  let confirmDeleteTimer = null;

  // ── DOM refs ────────────────────────────────────────────
  const chatBox      = document.getElementById('chat-box');
  const typingInd    = document.getElementById('typing-indicator');
  const userInput    = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const sendIcon     = document.getElementById('send-icon');
  const historyList  = document.getElementById('history-list');
  const newChatBtn   = document.getElementById('new-chat-btn');

  // ── Mesaj render ────────────────────────────────────────
  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function renderMath(el) {
    if (window.renderMathInElement) {
      window.renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$',  right: '$',  display: false },
          { left: '\\(', right: '\\)', display: false },
          { left: '\\[', right: '\\]', display: true },
        ],
        throwOnError: false,
      });
    }
  }

  function addMessageToDOM(role, text, isError = false) {
    // typing indicator'ı geç öncesine taşı
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ' + role;

    const bubble = document.createElement('div');
    bubble.className = 'msg ' + role + (isError ? ' error' : '');
    bubble.innerHTML = formatText(text);
    renderMath(bubble);

    wrap.appendChild(bubble);
    chatBox.insertBefore(wrap, typingInd);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function renderAllMessages(messages) {
    // typing indicator'ı koru, gerisini temizle
    const children = Array.from(chatBox.children);
    children.forEach(c => { if (c !== typingInd) c.remove(); });
    messages.forEach(m => addMessageToDOM(m.role, m.text, m.isError));
  }

  // ── Typing indicator ────────────────────────────────────
  function showTyping()   { typingInd.classList.add('show');    chatBox.scrollTop = chatBox.scrollHeight; }
  function hideTyping()   { typingInd.classList.remove('show'); }

  // ── Send button durumu ──────────────────────────────────
  function setSending(on) {
    isWaiting = on;
    sendBtn.disabled = on;
    userInput.disabled = on;
    sendIcon.className = on ? 'fas fa-spinner fa-spin-custom' : 'fas fa-paper-plane';
    if (on) { sendIcon.style.color = '#00f0ff'; sendBtn.style.fontSize = '1.1rem'; }
    else    { sendIcon.style.color = '#0a0c10'; sendBtn.style.fontSize = '1.3rem'; }
  }

  // ── Sidebar render ──────────────────────────────────────
  function renderSidebar() {
    historyList.innerHTML = '';
    const sorted = [...chats].sort((a, b) => b.timestamp - a.timestamp);

    if (sorted.length === 0) {
      historyList.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem;text-align:center;margin-top:20px;opacity:0.6;">Henüz sohbet yok</div>';
      return;
    }

    sorted.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'history-item' + (chat.id === currentChatId ? ' active' : '');
      item.dataset.id = chat.id;

      // Chat icon
      const icon = document.createElement('i');
      icon.className = 'fas fa-message chat-icon';
      item.appendChild(icon);

      // Title
      const title = document.createElement('span');
      title.className = 'chat-title';
      title.textContent = chat.title || 'Yeni Sohbet';
      item.appendChild(title);

      // Naming spinner (henüz isimlendirilmediyse ve mesaj varsa)
      if (!chat.isNamed && chat.messages && chat.messages.length > 1) {
        const spinner = document.createElement('span');
        spinner.className = 'naming-spinner';
        spinner.innerHTML = '<i class="fas fa-circle-notch fa-spin-custom"></i>';
        item.appendChild(spinner);
      }

      // Delete button
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn' + (confirmDeleteId === chat.id ? ' confirm' : '');
      delBtn.innerHTML = confirmDeleteId === chat.id
        ? '<i class="fas fa-exclamation"></i>'
        : '<i class="fas fa-trash-can"></i>';
      delBtn.title = confirmDeleteId === chat.id ? 'Emin misin? Tekrar tıkla!' : 'Sohbeti sil';

      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirmDeleteId === chat.id) {
          // Sil
          clearTimeout(confirmDeleteTimer);
          confirmDeleteId = null;
          deleteChat(chat.id);
        } else {
          // Onay iste
          clearTimeout(confirmDeleteTimer);
          confirmDeleteId = chat.id;
          renderSidebar();
          confirmDeleteTimer = setTimeout(() => {
            confirmDeleteId = null;
            renderSidebar();
          }, 2000);
        }
      });

      item.appendChild(delBtn);

      // Sohbet yükle
      item.addEventListener('click', () => loadChat(chat.id));

      historyList.appendChild(item);
    });
  }

  // ── Sohbet yönetimi ─────────────────────────────────────
  function getWelcomeMsg() {
    return {
      role: 'ai',
      text: '👋 Merhaba! Ben **Math Canavarı**. Matematik problemlerini çözer, denklemleri düzenler, LaTeX formatında cevaplar veririm. Sorunu yazmaya başla!',
    };
  }

  function createNewChat() {
    const id = Date.now().toString();
    const chat = {
      id,
      title: 'Yeni Sohbet',
      timestamp: Date.now(),
      messages: [getWelcomeMsg()],
      isNamed: false,
    };
    chats.unshift(chat);
    saveChats(chats);
    switchToChat(id);
  }

  function switchToChat(id) {
    currentChatId = id;
    const chat = chats.find(c => c.id === id);
    if (chat) renderAllMessages(chat.messages);
    renderSidebar();
  }

  function loadChat(id) {
    switchToChat(id);
  }

  function deleteChat(id) {
    chats = chats.filter(c => c.id !== id);
    saveChats(chats);

    if (id === currentChatId) {
      if (chats.length > 0) {
        const sorted = [...chats].sort((a, b) => b.timestamp - a.timestamp);
        switchToChat(sorted[0].id);
      } else {
        createNewChat();
      }
    } else {
      renderSidebar();
    }
  }

  // ── AI başlık al ─────────────────────────────────────────
  async function fetchChatTitle(firstUserMessage, chatId) {
    try {
      const prompt = `Aşağıdaki matematik sorusu veya konuşma için çok kısa, öz bir sohbet başlığı üret (maksimum 4-5 kelime, Türkçe, sadece başlığı yaz, başka hiçbir şey yazma):\n\n"${firstUserMessage}"`;
      const fd = new FormData();
      fd.append('message', prompt);
      const res = await fetch(API_URL, { method: 'POST', body: fd });
      if (!res.ok) throw new Error();
      const raw = await res.text();
      return raw.replace(/["""''']/g, '').replace(/\n/g, '').trim().substring(0, 40);
    } catch {
      return firstUserMessage.substring(0, 30);
    }
  }

  // ── Mesaj gönder ─────────────────────────────────────────
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isWaiting) return;

    userInput.value = '';
    setSending(true);

    // Kullanıcı mesajını kaydet ve göster
    const userMsg = { role: 'user', text };
    const chat = chats.find(c => c.id === currentChatId);
    if (!chat) { setSending(false); return; }

    chat.messages.push(userMsg);
    chat.timestamp = Date.now();
    saveChats(chats);
    addMessageToDOM('user', text);
    showTyping();

    const needsNaming = !chat.isNamed;

    try {
      const fd = new FormData();
      fd.append('message', text);
      const res = await fetch(API_URL, { method: 'POST', body: fd });
      if (!res.ok) throw new Error(`Sunucu hatası: ${res.status}`);
      const reply = await res.text();

      hideTyping();
      const aiMsg = { role: 'ai', text: reply };
      chat.messages.push(aiMsg);
      chat.timestamp = Date.now();
      saveChats(chats);
      addMessageToDOM('ai', reply);

      // Arka planda isim al
      if (needsNaming) {
        fetchChatTitle(text, chat.id).then(title => {
          const c = chats.find(x => x.id === chat.id);
          if (c) {
            c.title = title;
            c.isNamed = true;
            saveChats(chats);
            renderSidebar();
          }
        });
      }

    } catch (err) {
      console.error(err);
      hideTyping();
      const errMsg = {
        role: 'ai',
        text: '🚨 AI sunucusu şu an ulaşılamıyor. Lütfen daha sonra tekrar dene!',
        isError: true,
      };
      chat.messages.push(errMsg);
      saveChats(chats);
      addMessageToDOM('ai', errMsg.text, true);
    }

    setSending(false);
    renderSidebar(); // timestamp sıralaması güncellensin
  }

  // ── Event listeners ──────────────────────────────────────
  newChatBtn.addEventListener('click', createNewChat);
  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // ── Particle canvas ──────────────────────────────────────
  (function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function spawnParticles() {
      particles = [];
      for (let i = 0; i < 100; i++) {
        particles.push({
          x:  Math.random() * W,
          y:  Math.random() * H,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          r:  Math.random() * 2 + 1,
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur  = 10;
      ctx.fillStyle   = '#00f0ff';

      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) p.vy *= -1;
      }

      ctx.shadowBlur = 5;
      ctx.lineWidth  = 0.5;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(0,240,255,${0.15*(1-d/120)})`;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); spawnParticles(); });
    resize();
    spawnParticles();
    draw();
  })();

  // ── Başlangıç ────────────────────────────────────────────
  window.addEventListener('load', () => {
    if (chats.length === 0) {
      createNewChat();
    } else {
      const sorted = [...chats].sort((a, b) => b.timestamp - a.timestamp);
      switchToChat(sorted[0].id);
    }
    userInput.focus();
  });
  </script>
</body>
</html>
