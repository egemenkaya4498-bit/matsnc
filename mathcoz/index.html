<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH CANAVARI · KAYA STUDIOS AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0c10;
            --bg-panel: #11161e;
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #a020f0;
            --secondary-glow: rgba(160, 32, 240, 0.4);
            --glass-bg: rgba(20, 30, 45, 0.62);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #eef5ff;
            --text-muted: #9aaec9;
            --sidebar-width: 300px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 24px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.45);
        }

        .brand-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 8px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.78rem;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 14px var(--primary-glow);
        }

        .brand-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, var(--secondary), #b060f0);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px;
            border-radius: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px var(--secondary-glow);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--secondary-glow);
        }

        .kaya-plus-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 14px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .kaya-plus-btn:hover {
            background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .history-item {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .history-item.active {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .history-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-muted);
        }

        .history-item.active .history-title {
            color: white;
        }

        .delete-btn {
            margin-top: 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            text-align: left;
        }

        .delete-btn:hover {
            color: #ff9e9e;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .topbar-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .quality-badge {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #1e2a3a;
            box-shadow: 0 0 12px rgba(255, 180, 70, 0.6);
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 26px 10%;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 78%;
            padding: 18px 22px;
            border-radius: 28px;
            line-height: 1.7;
            font-size: 0.98rem;
            word-wrap: break-word;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: msgPop 0.28s ease;
        }

        @keyframes msgPop {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary), #8a2be2);
            border-bottom-right-radius: 8px;
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--glass-bg);
            border-bottom-left-radius: 8px;
            border-color: rgba(0, 240, 255, 0.7);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .error-msg {
            background: rgba(255, 50, 50, 0.16);
            border-color: rgba(255, 80, 80, 0.8);
            color: #ffd5d5;
        }

        .math-block {
            margin: 12px 0;
            overflow-x: auto;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(0, 240, 255, 0.18);
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 18px 24px;
            background: var(--glass-bg);
            border-radius: 28px;
            border: 1px solid var(--primary);
            width: fit-content;
        }

        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .input-panel {
            padding: 20px 10% 24px;
        }

        .input-wrapper {
            background: rgba(10, 15, 25, 0.82);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 240, 255, 0.18) inset;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow), 0 0 0 1px var(--primary) inset;
        }

        #userInput {
            flex: 1;
            height: 60px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #userInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(145deg, var(--primary), #00b8ff);
            color: #061017;
            font-size: 1.4rem;
            font-weight: 800;
            box-shadow: 0 0 20px var(--primary-glow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #sendBtn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 35px var(--primary-glow);
        }

        #sendBtn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-panel);
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-content input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .modal-content input:focus {
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .submit-btn {
            background: var(--primary);
            color: #0a0c10;
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3a;
            color: #c8f9ff;
            padding: 14px 24px;
            border-radius: 60px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 1100;
            font-weight: 500;
            animation: fadeInOut 3s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        .mobile-new-chat {
            display: none;
        }

        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }

            #chatBox,
            .input-panel {
                padding-left: 18px;
                padding-right: 18px;
            }

            .msg {
                max-width: 92%;
            }

            .topbar-title {
                font-size: 1.6rem;
            }

            .mobile-new-chat {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border: 1px solid rgba(0, 240, 255, 0.35);
                background: transparent;
                color: #c8f9ff;
                border-radius: 999px;
                padding: 10px 14px;
                cursor: pointer;
            }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app">
        <aside class="sidebar">
            <div>
                <div class="brand-badge">
                    <span class="brand-dot"></span>
                    KAYA STUDIOS PLUS
                </div>
                <div class="brand-title">MATH CANAVARI</div>
            </div>
            <button class="new-chat-btn" id="newChatBtn">YENI SOHBET</button>
            <button class="kaya-plus-btn" id="kayaPlusBtn">✨ KAYA STUDIOS PLUS SAHİBİ OL</button>
            <div class="history-list" id="historyList"></div>
            <div class="sidebar-footer">MATH CANAVARI v3.0 · Dünyanın En İyisi</div>
        </aside>

        <main class="chat-main">
            <div class="topbar">
                <div>
                    <div class="topbar-title">MATH CANAVARI</div>
                </div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div class="quality-badge">🏆 Dünyanın En Kaliteli Matematik Chatbot'u</div>
                    <button class="mobile-new-chat" id="mobileNewChatBtn">Yeni Sohbet</button>
                </div>
            </div>
            <div id="chatBox"></div>
            <div class="input-panel">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Matematik sorusu sor, LaTeX kullanabilirsin..." autofocus>
                    <button id="sendBtn">&gt;</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Kaya Studios Plus Modal -->
    <div id="kayaModal" class="modal">
        <div class="modal-content">
            <h2>KAYA STUDIOS PLUS SAHİBİ OL</h2>
            <input type="text" id="firstName" placeholder="Adınız" autocomplete="off">
            <input type="text" id="lastName" placeholder="Soyadınız" autocomplete="off">
            <input type="email" id="gmail" placeholder="Gmail adresiniz" autocomplete="off">
            <div class="modal-buttons">
                <button class="cancel-btn" id="closeModalBtn">Vazgeç</button>
                <button class="submit-btn" id="submitRequestBtn">Başvur</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== KONFİGÜRASYON ====================
        const STORAGE_KEY = 'math-canavari-v3';
        const API_BASE = 'https://matesonucai.onrender.com';   // Backend URL

        // ==================== VERİ MODELLERİ ====================
        let sessions = [];
        let activeId = null;
        let isStreaming = false;
        let streamCancel = null;
        let currentStreamElement = null;

        // ==================== BAŞLANGIÇ MESAJI ====================
        const welcomeMsg = {
            id: 'welcome',
            role: 'ai',
            text: 'Selam! Ben Matematik Canavarı 🧠 Çözmemi istediğin soruları getir, birlikte çözelim!'
        };

        // ==================== YARDIMCI FONKSİYONLAR ====================
        function saveToLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
        }

        function loadSessions() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed) && parsed.length) {
                        sessions = parsed;
                        return;
                    }
                }
            } catch (e) {}
            const newId = Date.now().toString() + Math.random().toString(36);
            sessions = [{
                id: newId,
                title: 'Yeni Sohbet',
                timestamp: Date.now(),
                messages: [{ ...welcomeMsg, id: 'welcome-' + newId }]
            }];
            activeId = newId;
            saveToLocal();
        }

        function getActiveSession() {
            return sessions.find(s => s.id === activeId) || sessions[0];
        }

        function updateActiveSession(updater) {
            sessions = sessions.map(s => s.id === activeId ? updater(s) : s);
            saveToLocal();
            renderSidebar();
            if (!isStreaming) renderMessages();
        }

        // ==================== RENDER ====================
        function renderTextWithMath(text) {
            const container = document.createElement('div');
            container.innerHTML = text.replace(/\n/g, '<br>');
            if (window.renderMathInElement) {
                window.renderMathInElement(container, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });
                container.querySelectorAll('.katex-display').forEach(block => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'math-block';
                    block.parentNode.insertBefore(wrapper, block);
                    wrapper.appendChild(block);
                });
            }
            return container;
        }

        function renderMessages() {
            const chatBox = document.getElementById('chatBox');
            const session = getActiveSession();
            chatBox.innerHTML = '';
            session.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.role === 'user' ? 'user-msg' : 'ai-msg'} ${msg.isError ? 'error-msg' : ''}`;
                div.appendChild(renderTextWithMath(msg.text));
                chatBox.appendChild(div);
            });
            if (isStreaming && !currentStreamElement) {
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.id = 'typingIndicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                chatBox.appendChild(indicator);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderSidebar() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            sessions.slice().sort((a,b) => b.timestamp - a.timestamp).forEach(s => {
                const item = document.createElement('div');
                item.className = `history-item ${s.id === activeId ? 'active' : ''}`;
                const titleSpan = document.createElement('div');
                titleSpan.className = 'history-title';
                titleSpan.textContent = s.title;
                titleSpan.onclick = () => {
                    if (isStreaming) stopStreaming();
                    activeId = s.id;
                    renderSidebar();
                    renderMessages();
                    document.getElementById('userInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                };
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = 'Sohbeti Sil';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (isStreaming) stopStreaming();
                    sessions = sessions.filter(ss => ss.id !== s.id);
                    if (sessions.length === 0) {
                        const newId = Date.now().toString() + Math.random().toString(36);
                        sessions = [{
                            id: newId,
                            title: 'Yeni Sohbet',
                            timestamp: Date.now(),
                            messages: [{ ...welcomeMsg, id: 'welcome-' + newId }]
                        }];
                    }
                    if (activeId === s.id) activeId = sessions[0].id;
                    saveToLocal();
                    renderSidebar();
                    renderMessages();
                    document.getElementById('userInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                };
                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        // ==================== AKIŞLI YAZMA ====================
        function stopStreaming() {
            if (streamCancel) {
                clearInterval(streamCancel);
                streamCancel = null;
            }
            isStreaming = false;
            currentStreamElement = null;
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            renderMessages();
        }

        function startStreaming(sessionId, messageId, fullTextRaw) {
            let cleanText = fullTextRaw.replace(/Google\s*kurdu/gi, '');
            cleanText = cleanText.replace(/^\s*\*\s+/gm, '- ');
            cleanText = cleanText.replace(/(\n\s*)\*\s+/g, '$1- ');

            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            const msgIndex = session.messages.findIndex(m => m.id === messageId);
            if (msgIndex === -1) return;

            const chatBox = document.getElementById('chatBox');
            const msgElements = chatBox.querySelectorAll('.msg');
            let targetDiv = null;
            for (let i = msgElements.length - 1; i >= 0; i--) {
                if (msgElements[i].classList.contains('ai-msg') && !msgElements[i].classList.contains('error-msg')) {
                    targetDiv = msgElements[i];
                    break;
                }
            }
            if (!targetDiv) {
                const newDiv = document.createElement('div');
                newDiv.className = 'msg ai-msg';
                chatBox.appendChild(newDiv);
                targetDiv = newDiv;
            }

            currentStreamElement = targetDiv;
            let currentPos = 0;
            const totalLen = cleanText.length;

            function updateChunk() {
                if (!currentStreamElement) {
                    stopStreaming();
                    return;
                }
                const step = Math.floor(Math.random() * 4) + 2;
                currentPos = Math.min(currentPos + step, totalLen);
                const partial = cleanText.substring(0, currentPos);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = partial.replace(/\n/g, '<br>');
                if (window.renderMathInElement) {
                    window.renderMathInElement(tempDiv, {
                        delimiters: [
                            { left: '$$', right: '$$', display: true },
                            { left: '$', right: '$', display: false },
                            { left: '\\(', right: '\\)', display: false },
                            { left: '\\[', right: '\\]', display: true }
                        ],
                        throwOnError: false
                    });
                    tempDiv.querySelectorAll('.katex-display').forEach(block => {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'math-block';
                        block.parentNode.insertBefore(wrapper, block);
                        wrapper.appendChild(block);
                    });
                }
                currentStreamElement.innerHTML = '';
                while (tempDiv.firstChild) currentStreamElement.appendChild(tempDiv.firstChild);

                updateActiveSession(s => ({
                    ...s,
                    messages: s.messages.map(m => m.id === messageId ? { ...m, text: partial } : m)
                }));

                chatBox.scrollTop = chatBox.scrollHeight;

                if (currentPos >= totalLen) {
                    stopStreaming();
                }
            }

            streamCancel = setInterval(updateChunk, 45);
            isStreaming = true;
        }

        // ==================== BAŞLIK OLUŞTUR ====================
        async function generateTitleAsync(firstUserMsg, sessionId) {
            try {
                const form = new FormData();
                form.append('message', `Şu mesaja Türkçe bir sohbet başlığı ver. Sadece başlığı yaz: ${firstUserMsg}`);
                const res = await fetch(`${API_BASE}/chat`, { method: 'POST', body: form });
                if (res.ok) {
                    let title = (await res.text()).trim().slice(0, 40);
                    title = title.replace(/^"|"$/g, '').replace(/\*\*/g, '');
                    if (title) {
                        sessions = sessions.map(s => s.id === sessionId ? { ...s, title } : s);
                        saveToLocal();
                        renderSidebar();
                    }
                }
            } catch(e) { /* sessiz */ }
        }

        // ==================== BAĞLAM OLUŞTUR ====================
        function buildContext() {
            const session = getActiveSession();
            const recent = session.messages.slice(-20);
            let history = "";
            for (const msg of recent) {
                if (msg.role === 'user') history += `Kullanıcı: ${msg.text}\n`;
                else if (msg.role === 'ai' && !msg.isError) history += `Asistan: ${msg.text}\n`;
            }
            const system = `Sen bir matematik asistanısın. Konuşma geçmişini dikkate al.
Kurallar:
- Matematik ifadelerini LaTeX ile yaz ($...$ veya $$...$$).
- Madde işaretleri için asla "*" kullanma, "-" kullan.
- Asla "Google kurdu" ifadesini kullanma.
- Adım adım çözüm yap, anlaşılır ve doğal Türkçe cevap ver.
- 8. sınıf seviyesine uygun detaylandır.`;
            return `${system}\n\n[Geçmiş]\n${history}\nAsistan:`;
        }

        // ==================== MESAJ GÖNDERME ====================
        async function sendMessage() {
            if (isStreaming) return;
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            const session = getActiveSession();
            const isFirstUser = session.messages.filter(m => m.role === 'user').length === 0;

            const userMsg = {
                id: Date.now() + '-user',
                role: 'user',
                text: text
            };
            updateActiveSession(s => ({
                ...s,
                timestamp: Date.now(),
                messages: [...s.messages, userMsg]
            }));

            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            const aiMsgId = Date.now() + '-ai-stream';
            updateActiveSession(s => ({
                ...s,
                messages: [...s.messages, { id: aiMsgId, role: 'ai', text: '' }]
            }));
            renderMessages();

            const context = buildContext();
            const fullPrompt = context + `\nKullanıcı: ${text}\nAsistan:`;

            try {
                const form = new FormData();
                form.append('message', fullPrompt);
                const response = await fetch(`${API_BASE}/chat`, { method: 'POST', body: form });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const rawReply = await response.text();
                startStreaming(activeId, aiMsgId, rawReply);
                if (isFirstUser) {
                    generateTitleAsync(text, activeId);
                }
            } catch (err) {
                updateActiveSession(s => ({
                    ...s,
                    messages: s.messages.map(m => m.id === aiMsgId ? { ...m, text: `❌ Hata: ${err.message}`, isError: true } : m)
                }));
                renderMessages();
                input.disabled = false;
                btn.disabled = false;
            }
        }

        // ==================== YENİ SOHBET ====================
        function newChat() {
            if (isStreaming) stopStreaming();
            const newId = Date.now().toString() + Math.random().toString(36);
            const newSession = {
                id: newId,
                title: 'Yeni Sohbet',
                timestamp: Date.now(),
                messages: [{ ...welcomeMsg, id: 'welcome-' + newId }]
            };
            sessions.unshift(newSession);
            activeId = newId;
            saveToLocal();
            renderSidebar();
            renderMessages();
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('userInput').focus();
        }

        // ==================== KAYA STUDIOS PLUS ====================
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            if (isError) toast.style.borderLeftColor = '#ff5e5e';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function submitPlusRequest() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('gmail').value.trim();

            if (!firstName || !lastName || !email) {
                showToast('Lütfen tüm alanları doldurun.', true);
                return;
            }
            if (!email.endsWith('@gmail.com')) {
                showToast('Lütfen geçerli bir Gmail adresi girin.', true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/kaya-plus-request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: firstName, surname: lastName, email })
                });
                if (response.ok) {
                    showToast('İsteğiniz Beklemeye Alındı. 24 Saat içinde size Gmail üzerinden bilgilendireceğiz.');
                    closeModal();
                    // form temizle
                    document.getElementById('firstName').value = '';
                    document.getElementById('lastName').value = '';
                    document.getElementById('gmail').value = '';
                } else {
                    const err = await response.text();
                    showToast(`Hata: ${err}`, true);
                }
            } catch (err) {
                showToast('Bağlantı hatası. Lütfen daha sonra tekrar deneyin.', true);
            }
        }

        function openModal() {
            document.getElementById('kayaModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('kayaModal').style.display = 'none';
        }

        // ==================== PARTİKÜL ANİMASYONU ====================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let w = 0, h = 0;

        function initParticles() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
            particles = [];
            const count = Math.min(70, Math.floor((w * h) / 15000));
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35,
                    size: Math.random() * 2 + 0.8
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, w, h);
            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
                ctx.beginPath();
                ctx.fillStyle = 'rgba(0, 240, 255, 0.9)';
                ctx.shadowColor = 'rgba(0, 240, 255, 0.5)';
                ctx.shadowBlur = 12;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i+1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 140) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${0.18 * (1 - dist/140)})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', () => {
            initParticles();
        });

        // ==================== OLAY BAĞLAMALARI ====================
        document.getElementById('newChatBtn').addEventListener('click', newChat);
        document.getElementById('mobileNewChatBtn').addEventListener('click', newChat);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isStreaming) {
                e.preventDefault();
                sendMessage();
            }
        });
        document.getElementById('kayaPlusBtn').addEventListener('click', openModal);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('submitRequestBtn').addEventListener('click', submitPlusRequest);
        // modal dışına tıklayınca kapat
        window.onclick = (e) => {
            const modal = document.getElementById('kayaModal');
            if (e.target === modal) closeModal();
        };

        // ==================== BAŞLAT ====================
        loadSessions();
        if (!activeId) activeId = sessions[0].id;
        renderSidebar();
        renderMessages();
        initParticles();
        drawParticles();
        console.log('Math Canavari v3.0 - Kaya Studios Plus eklendi');
    </script>
</body>
</html>
