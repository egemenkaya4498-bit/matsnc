<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH CANAVARI · KAYA STUDIOS AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0c10;
            --bg-panel: #11161e;
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #a020f0;
            --secondary-glow: rgba(160, 32, 240, 0.4);
            --glass-bg: rgba(20, 30, 45, 0.62);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #eef5ff;
            --text-muted: #9aaec9;
            --sidebar-width: 300px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 24px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.45);
        }

        .brand-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 8px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.78rem;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 14px var(--primary-glow);
        }

        .brand-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, var(--secondary), #b060f0);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px;
            border-radius: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px var(--secondary-glow);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--secondary-glow);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .history-item {
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            transition: all 0.2s ease;
        }

        .history-item.active {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .history-main {
            width: 100%;
            background: none;
            border: none;
            color: inherit;
            text-align: left;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-muted);
        }

        .history-item.active .history-main,
        .history-main:hover {
            color: white;
        }

        .delete-btn {
            margin-top: 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
        }

        .delete-btn:hover {
            color: #ff9e9e;
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 16px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .topbar-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 26px 10%;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 78%;
            padding: 18px 22px;
            border-radius: 28px;
            line-height: 1.7;
            font-size: 0.98rem;
            word-wrap: break-word;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: msgPop 0.28s ease;
        }

        @keyframes msgPop {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary), #8a2be2);
            border-bottom-right-radius: 8px;
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--glass-bg);
            border-bottom-left-radius: 8px;
            border-color: rgba(0, 240, 255, 0.7);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .error-msg {
            background: rgba(255, 50, 50, 0.16);
            border-color: rgba(255, 80, 80, 0.8);
            color: #ffd5d5;
        }

        .math-block {
            margin: 12px 0;
            overflow-x: auto;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(0, 240, 255, 0.18);
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 18px 24px;
            background: var(--glass-bg);
            border-radius: 28px;
            border: 1px solid var(--primary);
            width: fit-content;
        }

        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .input-panel {
            padding: 20px 10% 24px;
        }

        .input-wrapper {
            background: rgba(10, 15, 25, 0.82);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 240, 255, 0.18) inset;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow), 0 0 0 1px var(--primary) inset;
        }

        #userInput {
            flex: 1;
            height: 60px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #userInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(145deg, var(--primary), #00b8ff);
            color: #061017;
            font-size: 1.4rem;
            font-weight: 800;
            box-shadow: 0 0 20px var(--primary-glow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #sendBtn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 35px var(--primary-glow);
        }

        #sendBtn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .mobile-new-chat {
            display: none;
        }

        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }

            #chatBox,
            .input-panel {
                padding-left: 18px;
                padding-right: 18px;
            }

            .msg {
                max-width: 92%;
            }

            .topbar-title {
                font-size: 1.6rem;
            }

            .mobile-new-chat {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border: 1px solid rgba(0, 240, 255, 0.35);
                background: transparent;
                color: #c8f9ff;
                border-radius: 999px;
                padding: 10px 14px;
                cursor: pointer;
            }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app">
        <aside class="sidebar">
            <div>
                <div class="brand-badge">
                    <span class="brand-dot"></span>
                    KAYA STUDIOS PLUS
                </div>
                <div class="brand-title">MATH CANAVARI</div>
            </div>

            <button class="new-chat-btn" id="newChatBtn">YENI SOHBET</button>
            <div class="history-list" id="historyList"></div>
            <div class="sidebar-footer">MATH CANAVARI v3.0 · AKILLI AKIŞ</div>
        </aside>

        <main class="chat-main">
            <div class="topbar">
                <div>
                    <div class="topbar-title">MATH CANAVARI</div>
                </div>
                <button class="mobile-new-chat" id="mobileNewChatBtn">Yeni Sohbet</button>
            </div>

            <div id="chatBox"></div>

            <div class="input-panel">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Matematik sorusu sor, LaTeX kullanabilirsin..." autofocus>
                    <button id="sendBtn">&gt;</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // =============================================================
        // YAPILANDIRMA
        // =============================================================
        const STORAGE_KEY = 'math-canavari-chats';
        const SERVER_URL = 'https://matesonucai.onrender.com/chat';

        const starterMessage = {
            id: 'starter',
            role: 'ai',
            text: 'Selam! Ben Matematik Canavarı 🧠 Çözmemi istediğin soruları getir, birlikte çözelim!'
        };

        // =============================================================
        // DURUM YÖNETİMİ
        // =============================================================
        let sessions = loadStoredSessions();
        if (!sessions.length) {
            sessions = [createSession()];
        }
        let activeChatId = sessions[0].id;
        let isWaitingForAI = false;
        let renamingChatId = null;
        let currentStreamTimeout = null;   // kelime kelime yazma zamanlayıcısı
        let streamingMessageId = null;      // hangi mesaj akıyor

        // =============================================================
        // OTURUM FONKSİYONLARI
        // =============================================================
        function createSession() {
            const id = Date.now().toString() + Math.floor(Math.random() * 1000).toString();
            return {
                id,
                title: 'Yeni Sohbet',
                timestamp: Date.now(),
                messages: [{ ...starterMessage, id: 'starter-' + id }]
            };
        }

        function loadStoredSessions() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveSessions() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
        }

        function getActiveSession() {
            return sessions.find((session) => session.id === activeChatId) || sessions[0];
        }

        function updateSession(sessionId, updater) {
            sessions = sessions.map((session) => session.id === sessionId ? updater(session) : session);
            saveSessions();
            renderSidebar();
            renderMessages();
        }

        // =============================================================
        // RENDER (KaTeX ile destekli)
        // =============================================================
        function renderTextWithMath(text) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = text.replace(/\n/g, '<br>');

            if (window.renderMathInElement) {
                window.renderMathInElement(wrapper, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });

                wrapper.querySelectorAll('.katex-display').forEach((item) => {
                    const block = document.createElement('div');
                    block.className = 'math-block';
                    item.parentNode.insertBefore(block, item);
                    block.appendChild(item);
                });
            }

            return wrapper;
        }

        function renderMessages() {
            const chatBox = document.getElementById('chatBox');
            const activeSession = getActiveSession();
            chatBox.innerHTML = '';

            activeSession.messages.forEach((message) => {
                const div = document.createElement('div');
                div.className = 'msg ' + (message.role === 'user' ? 'user-msg' : 'ai-msg') + (message.isError ? ' error-msg' : '');
                div.appendChild(renderTextWithMath(message.text));
                chatBox.appendChild(div);
            });

            if (isWaitingForAI && !streamingMessageId) {
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.id = 'typingIndicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                chatBox.appendChild(indicator);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderSidebar() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            sessions
                .slice()
                .sort((a, b) => b.timestamp - a.timestamp)
                .forEach((session) => {
                    const item = document.createElement('div');
                    item.className = 'history-item' + (session.id === activeChatId ? ' active' : '');

                    const mainBtn = document.createElement('button');
                    mainBtn.className = 'history-main';
                    mainBtn.textContent = renamingChatId === session.id ? 'Adlandırılıyor...' : session.title;
                    mainBtn.onclick = () => {
                        if (currentStreamTimeout) clearTimeout(currentStreamTimeout);
                        streamingMessageId = null;
                        isWaitingForAI = false;
                        activeChatId = session.id;
                        renderSidebar();
                        renderMessages();
                        document.getElementById('userInput').disabled = false;
                        document.getElementById('sendBtn').disabled = false;
                    };

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.textContent = 'Sohbeti Sil';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteChat(session.id);
                    };

                    item.appendChild(mainBtn);
                    item.appendChild(deleteBtn);
                    historyList.appendChild(item);
                });
        }

        // =============================================================
        // SOHBET İŞLEMLERİ
        // =============================================================
        function createNewChat() {
            if (currentStreamTimeout) clearTimeout(currentStreamTimeout);
            streamingMessageId = null;
            isWaitingForAI = false;
            const session = createSession();
            sessions.unshift(session);
            activeChatId = session.id;
            saveSessions();
            renderSidebar();
            renderMessages();
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('userInput').focus();
        }

        function deleteChat(chatId) {
            if (currentStreamTimeout) clearTimeout(currentStreamTimeout);
            streamingMessageId = null;
            isWaitingForAI = false;
            sessions = sessions.filter((session) => session.id !== chatId);

            if (!sessions.length) {
                const fallback = createSession();
                sessions = [fallback];
                activeChatId = fallback.id;
            } else if (activeChatId === chatId) {
                activeChatId = sessions[0].id;
            }

            saveSessions();
            renderSidebar();
            renderMessages();
        }

        // =============================================================
        // AKIŞLI YAZMA (KELİME KELİME)
        // =============================================================
        function startStreamingMessage(sessionId, messageId, fullText) {
            // fullText içinde istenmeyen ifadeleri temizle (asla "Google kurdu")
            let cleanText = fullText.replace(/Google\s*kurdu/gi, '');
            // bullet pointleri dönüştür: satır başında * olanları - ile değiştir
            cleanText = cleanText.replace(/^\s*\*\s+/gm, '- ');
            
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            
            const messageIndex = session.messages.findIndex(m => m.id === messageId);
            if (messageIndex === -1) return;
            
            let currentPos = 0;
            const totalLen = cleanText.length;
            
            function typeNextChunk() {
                if (!sessions.find(s => s.id === sessionId)) return; // oturum silindi
                const curSession = sessions.find(s => s.id === sessionId);
                const msg = curSession.messages.find(m => m.id === messageId);
                if (!msg) return;
                
                // her adımda 1-3 karakter ekleyelim (akıcı görünür)
                const step = Math.floor(Math.random() * 3) + 1;
                currentPos = Math.min(currentPos + step, totalLen);
                const partial = cleanText.substring(0, currentPos);
                msg.text = partial;
                
                // güncelle
                updateSession(sessionId, (s) => ({
                    ...s,
                    messages: s.messages.map(m => m.id === messageId ? { ...m, text: partial } : m)
                }));
                
                if (currentPos < totalLen) {
                    currentStreamTimeout = setTimeout(typeNextChunk, 35 + Math.random() * 20);
                } else {
                    // bitince temizlik
                    currentStreamTimeout = null;
                    streamingMessageId = null;
                    isWaitingForAI = false;
                    document.getElementById('userInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    document.getElementById('userInput').focus();
                    renderMessages();
                }
            }
            
            typeNextChunk();
        }

        // =============================================================
        // BAŞLIK OLUŞTUR (ilk mesaj)
        // =============================================================
        async function generateChatTitle(firstUserMessage, sessionId) {
            try {
                const formData = new FormData();
                formData.append('message', 'Şu mesaja Türkçe bir sohbet başlığı ver. İlk yazdığı mesajla alakalı olsun, alakasız olmasın: ' + firstUserMessage);

                const response = await fetch(SERVER_URL, { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Başlık alınamadı');

                let title = (await response.text()).trim();
                title = title.replace(/^"|"$/g, '').replace(/\*\*/g, '').slice(0, 40);
                if (!title) title = firstUserMessage.slice(0, 30);
                
                updateSession(sessionId, (session) => ({ ...session, title: title || 'Yeni Sohbet' }));
            } catch (error) {
                console.error('Başlık hatası:', error);
                updateSession(sessionId, (session) => ({ ...session, title: firstUserMessage.slice(0, 30) || 'Yeni Sohbet' }));
            } finally {
                renamingChatId = null;
                renderSidebar();
            }
        }

        // =============================================================
        // BAĞLAMLI PROMPT (LATEX + BULLET DÜZENİ + YASAK İFADE)
        // =============================================================
        function buildContextPrompt(sessionMessages, currentUserText) {
            let systemInstruction = `Sen bir matematik asistanısın. Tüm konuşma geçmişini dikkate alarak cevap ver.
**KURALLAR:**
1. Matematik ifadelerini LaTeX ile yaz (örnek: $x^2$, $\\sqrt{4}$, $\\frac{3}{4}$). 
2. Madde işaretleri için ASLA "*" kullanma; bunun yerine "-" kullan (örnek: - ilk madde, - ikinci madde).
3. ASLA "Google kurdu" veya benzeri bir ifadeyi kullanma. Kullanıcıya saygılı ve yardımsever ol.
4. Cevabını doğal Türkçe ve anlaşılır bir dille yaz.`;

            const recentMessages = sessionMessages.slice(-15);
            let conversationHistory = "";
            for (const msg of recentMessages) {
                if (msg.role === 'user') conversationHistory += `Kullanıcı: ${msg.text}\n`;
                else if (msg.role === 'ai' && !msg.isError) conversationHistory += `Asistan: ${msg.text}\n`;
            }
            conversationHistory += `Kullanıcı: ${currentUserText}\nAsistan:`;
            return `${systemInstruction}\n\n[Geçmiş konuşma]\n${conversationHistory}`;
        }

        // =============================================================
        // MESAJ GÖNDER (AKIŞLI + BELLEK)
        // =============================================================
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const text = input.value.trim();
            const session = getActiveSession();
            
            if (!text || isWaitingForAI || !session) return;
            
            // önceki akış varsa temizle
            if (currentStreamTimeout) {
                clearTimeout(currentStreamTimeout);
                currentStreamTimeout = null;
            }
            streamingMessageId = null;
            
            const userMessage = {
                id: Date.now() + '-user',
                role: 'user',
                text
            };
            const isFirstUserMessage = session.messages.filter(m => m.role === 'user').length === 0;
            
            // kullanıcı mesajını ekle
            updateSession(session.id, (current) => ({
                ...current,
                timestamp: Date.now(),
                messages: [...current.messages, userMessage]
            }));
            
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            isWaitingForAI = true;
            renderMessages();   // gösterirken bekliyor
            
            // full prompt (geçmiş + kural)
            const fullPrompt = buildContextPrompt(session.messages, text);
            
            try {
                const formData = new FormData();
                formData.append('message', fullPrompt);
                
                const response = await fetch(SERVER_URL, { method: 'POST', body: formData });
                if (!response.ok) throw new Error(`Sunucu hatası: ${response.status}`);
                
                let replyText = await response.text();
                // Ekstra güvenlik: "Google kurdu" ifadesini tamamen kaldır
                replyText = replyText.replace(/Google\s*kurdu/gi, '');
                
                // Geçici boş mesaj oluştur, sonra akışla doldur
                const tempId = Date.now() + '-ai-stream';
                const aiPlaceholder = {
                    id: tempId,
                    role: 'ai',
                    text: ''
                };
                
                updateSession(session.id, (current) => ({
                    ...current,
                    messages: [...current.messages, aiPlaceholder]
                }));
                
                streamingMessageId = tempId;
                startStreamingMessage(session.id, tempId, replyText);
                
                // ilk mesajsa başlık oluştur (arka planda)
                if (isFirstUserMessage) {
                    renamingChatId = session.id;
                    renderSidebar();
                    generateChatTitle(text, session.id);
                }
                
            } catch (error) {
                console.error('Hata:', error);
                const errorMessage = {
                    id: Date.now() + '-error',
                    role: 'ai',
                    text: `❌ Bağlantı hatası: ${error.message || 'Sunucuya ulaşılamadı. Lütfen tekrar deneyin.'}`,
                    isError: true
                };
                updateSession(session.id, (current) => ({
                    ...current,
                    messages: [...current.messages, errorMessage]
                }));
                isWaitingForAI = false;
                streamingMessageId = null;
                input.disabled = false;
                sendBtn.disabled = false;
                renderMessages();
                input.focus();
            }
            // Not: Akış devam ederken isWaitingForAI true kalır, send butonu kilitli. Akış bitince startStreamingMessage içinde false yapılır.
        }

        // =============================================================
        // PARTİKÜL ANİMASYONU
        // =============================================================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let width = 0, height = 0;

        function initParticles() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            particles = [];
            const particleCount = Math.min(72, Math.floor((width * height) / 15000));
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35,
                    size: Math.random() * 2 + 0.8
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath();
                ctx.fillStyle = 'rgba(0, 240, 255, 0.9)';
                ctx.shadowColor = 'rgba(0, 240, 255, 0.5)';
                ctx.shadowBlur = 12;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 140) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(0, 240, 255, ' + (0.18 * (1 - dist / 140)) + ')';
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }

        // =============================================================
        // OLAY DİNLEYİCİLERİ
        // =============================================================
        document.getElementById('newChatBtn').addEventListener('click', createNewChat);
        document.getElementById('mobileNewChatBtn').addEventListener('click', createNewChat);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keydown', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
        window.addEventListener('resize', initParticles);
        
        // BAŞLAT
        initParticles();
        drawParticles();
        renderSidebar();
        renderMessages();
        console.log('Math Canavari v3.0 (LaTeX, - madde işareti, kelime kelime akış, Google kurdu yasak)');
    </script>
</body>
