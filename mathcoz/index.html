<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH CANAVARI · KAYA STUDIOS AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0c10;
            --bg-panel: #11161e;
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #a020f0;
            --secondary-glow: rgba(160, 32, 240, 0.4);
            --glass-bg: rgba(20, 30, 45, 0.62);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #eef5ff;
            --text-muted: #9aaec9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .topbar-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 26px 10%;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 78%;
            padding: 18px 22px;
            border-radius: 28px;
            line-height: 1.7;
            font-size: 0.98rem;
            word-wrap: break-word;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: msgPop 0.28s ease;
        }

        @keyframes msgPop {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary), #8a2be2);
            border-bottom-right-radius: 8px;
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--glass-bg);
            border-bottom-left-radius: 8px;
            border-color: rgba(0, 240, 255, 0.7);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .error-msg {
            background: rgba(255, 50, 50, 0.16);
            border-color: rgba(255, 80, 80, 0.8);
            color: #ffd5d5;
        }

        .math-block {
            margin: 12px 0;
            overflow-x: auto;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(0, 240, 255, 0.18);
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 18px 24px;
            background: var(--glass-bg);
            border-radius: 28px;
            border: 1px solid var(--primary);
            width: fit-content;
        }

        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .input-panel {
            padding: 20px 10% 24px;
        }

        .input-wrapper {
            background: rgba(10, 15, 25, 0.82);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(0, 240, 255, 0.18) inset;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow), 0 0 0 1px var(--primary) inset;
        }

        #userInput {
            flex: 1;
            height: 60px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #userInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(145deg, var(--primary), #00b8ff);
            color: #061017;
            font-size: 1.4rem;
            font-weight: 800;
            box-shadow: 0 0 20px var(--primary-glow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #sendBtn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 35px var(--primary-glow);
        }

        #sendBtn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="app">
        <main class="chat-main">
            <div class="topbar">
                <div class="topbar-title">MATH CANAVARI</div>
            </div>

            <div id="chatBox"></div>

            <div class="input-panel">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Matematik sorusu sor, denklem yaz, LaTeX kullan..." autofocus>
                    <button id="sendBtn">&gt;</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SERVER_URL = '/.netlify/functions/chat';

        // Tek bir mesaj dizisi (sayfa yenilenince kaybolur)
        let messages = [
            {
                id: 'starter',
                role: 'ai',
                text: 'Selam. Ben Matematik Canavarı! Çözmemi istediğin soruları getir birlikte çözelim.'
            }
        ];
        let isWaitingForAI = false;

        function renderTextWithMath(text) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = text.replace(/\n/g, '<br>');

            if (window.renderMathInElement) {
                window.renderMathInElement(wrapper, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });

                wrapper.querySelectorAll('.katex-display').forEach((item) => {
                    const block = document.createElement('div');
                    block.className = 'math-block';
                    item.parentNode.insertBefore(block, item);
                    block.appendChild(item);
                });
            }

            return wrapper;
        }

        function renderMessages() {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = '';

            messages.forEach((message) => {
                const div = document.createElement('div');
                div.className = 'msg ' + (message.role === 'user' ? 'user-msg' : 'ai-msg') + (message.isError ? ' error-msg' : '');
                div.appendChild(renderTextWithMath(message.text));
                chatBox.appendChild(div);
            });

            if (isWaitingForAI) {
                const indicator = document.createElement('div');
                indicator.className = 'typing-indicator';
                indicator.id = 'typingIndicator';
                indicator.innerHTML = '<span></span><span></span><span></span>';
                chatBox.appendChild(indicator);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || isWaitingForAI) return;

            const userMessage = {
                id: Date.now() + '-user',
                role: 'user',
                text
            };
            messages.push(userMessage);
            input.value = '';
            isWaitingForAI = true;
            renderMessages();

            try {
                const formData = new FormData();
                formData.append('message', text);

                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    body: formData
                });

                const replyText = await response.text();
                if (!response.ok) {
                    throw new Error(replyText || ('Sunucu hatasi: ' + response.status));
                }

                const aiMessage = {
                    id: Date.now() + '-ai',
                    role: 'ai',
                    text: replyText
                };
                messages.push(aiMessage);
            } catch (error) {
                const errorMessage = {
                    id: Date.now() + '-error',
                    role: 'ai',
                    text: 'Sunucuya baglanirken hata olustu. ' + (error && error.message ? error.message : 'AI sunucusuna ulasilamadi.'),
                    isError: true
                };
                messages.push(errorMessage);
            } finally {
                isWaitingForAI = false;
                renderMessages();
            }
        }

        // Particle arka plan (aynen kalır)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let width = 0;
        let height = 0;

        function initParticles() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            particles = [];

            for (let i = 0; i < 72; i += 1) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35,
                    size: Math.random() * 2 + 0.8
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);

            particles.forEach((p) => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.fillStyle = 'rgba(0, 240, 255, 0.9)';
                ctx.shadowColor = 'rgba(0, 240, 255, 0.5)';
                ctx.shadowBlur = 12;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.shadowBlur = 0;

            for (let i = 0; i < particles.length; i += 1) {
                for (let j = i + 1; j < particles.length; j += 1) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 140) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(0, 240, 255, ' + (0.18 * (1 - dist / 140)) + ')';
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(drawParticles);
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        window.addEventListener('resize', initParticles);

        initParticles();
        drawParticles();
        renderMessages();
    </script>
</body>
</html>
