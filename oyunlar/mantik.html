<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGS'ye Hazırlık | Üst Düzey Soru Bankası</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800&display=swap');

        :root {
            --bg: #050505;
            --card: #111111;
            --accent: #f59e0b;
            --correct: #10b981;
            --wrong: #ef4444;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card);
            border: 1px solid #222;
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-box {
            background: #000;
            padding: 12px 25px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 800;
            font-size: 1.2rem;
        }

        .diff-badge {
            background: #ff0040;
            color: white;
            padding: 4px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .progress-rail {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            border-radius: 10px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .q-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #555;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .q-cat {
            display: inline-block;
            background: #1a1a2e;
            color: #7c3aed;
            padding: 3px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-left: 10px;
        }

        .q-text {
            font-size: 1.5rem;
            margin: 25px 0 45px;
            line-height: 1.7;
            font-weight: 300;
            min-height: 100px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .opt {
            background: #181818;
            border: 1px solid #333;
            padding: 22px;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 15px;
            line-height: 1.5;
        }

        .opt:hover {
            border-color: var(--accent);
            background: #222;
            transform: translateY(-2px);
        }

        .opt.active {
            border-color: var(--accent);
            background: rgba(245, 158, 11, 0.15);
        }

        .opt.correct {
            background: var(--correct) !important;
            border: none;
            color: white;
            font-weight: 700;
        }

        .opt.wrong {
            background: var(--wrong) !important;
            border: none;
            color: white;
        }

        .btn {
            width: 100%;
            margin-top: 35px;
            padding: 22px;
            border-radius: 20px;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.1;
            cursor: not-allowed;
        }

        sup { font-size: 0.7em; }
        b { color: var(--accent); }

        .hint-box {
            background: #0a0a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            line-height: 1.6;
            display: none;
        }

        .hint-box.show { display: block; }

        @media (max-width: 768px) {
            .options { grid-template-columns: 1fr; }
            .q-text { font-size: 1.2rem; }
            .container { padding: 25px; border-radius: 25px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h2 style="font-weight:800; color: var(--accent)">LGS Üst Düzey Soru Bankası</h2>
                <p style="font-size: 0.8rem; color: #666">Gerçek LGS Kazanım Soruları Seviyesinde</p>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <span class="diff-badge">ZOR</span>
                <div class="score-box"><span id="score">0</span> / 100</div>
            </div>
        </div>
        <div class="progress-rail">
            <div class="progress-bar" id="bar"></div>
        </div>
        <div id="game">
            <div class="q-tag" id="q-idx">SORU 01</div>
            <div class="q-text" id="q-text">Sistem başlatılıyor...</div>
            <div class="options" id="opts"></div>
            <button class="btn" id="btn" disabled onclick="action()">CEVABI KONTROL ET</button>
        </div>
    </div>

    <script>
        const rand = (a, b) => Math.floor(Math.random() * (b - a + 1) + a);
        const shuffle = arr => { let a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
        const randArr = arr => arr[rand(0, arr.length - 1)];
        const gcd = (a, b) => b === 0 ? Math.abs(a) : gcd(b, a % b);
        const lcm = (a, b) => Math.abs(a * b) / gcd(a, b);
        const isPrime = n => { if (n < 2) return false; for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false; return true; };
        const primeFactors = n => { let f = {}; let d = 2; let num = Math.abs(n); while (num > 1) { while (num % d === 0) { f[d] = (f[d] || 0) + 1; num /= d; } d++; } return f; };
        const divisorCount = n => { let f = primeFactors(n); let c = 1; for (let k in f) c *= (f[k] + 1); return c; };
        const factorial = n => n <= 1 ? 1 : n * factorial(n - 1);
        const comb = (n, r) => factorial(n) / (factorial(r) * factorial(n - r));

        const usedHashes = new Set();
        function uniqueQ(gen) {
            for (let i = 0; i < 300; i++) {
                let q = gen();
                let h = q.q + q.a.join('');
                if (!usedHashes.has(h)) { usedHashes.add(h); return q; }
            }
            return gen();
        }

        function makeDist(correct, n = 3) {
            let c = parseFloat(correct);
            let s = new Set([correct.toString()]);
            let att = 0;
            while (s.size < n + 1 && att < 200) {
                att++;
                let strategies = [
                    () => c + rand(1, 3),
                    () => c - rand(1, 3),
                    () => c + rand(4, 8),
                    () => c - rand(4, 8),
                    () => c * 2,
                    () => Math.round(c / 2),
                    () => c + rand(1, 2) * (rand(0, 1) ? 1 : -1),
                    () => -c,
                    () => c * 2 + rand(-2, 2),
                    () => c + rand(10, 20)
                ];
                let d = randArr(strategies)();
                if (d !== c && !isNaN(d) && isFinite(d)) s.add(d.toString());
            }
            let inc = 1;
            while (s.size < n + 1) { s.add((c + inc * 11).toString()); inc++; }
            return shuffle([...s]);
        }

        // ================================================================
        //  GERÇEK LGS SEVİYESİNDE ZOR SORU GENERATÖRLERİ
        // ================================================================

        const Q = {
            "Üslü İfadeler": [],
            "Kareköklü İfadeler": [],
            "Cebirsel İfadeler": [],
            "Doğrusal Denklemler": [],
            "Eşitsizlikler": [],
            "Üçgenler ve Pisagor": [],
            "Eşlik ve Benzerlik": [],
            "Dönüşüm Geometrisi": [],
            "Olasılık": [],
            "Veri Analizi": [],
            "Mantık ve Problem": []
        };

        // ================================================================
        //  1. ÜSLÜ İFADELER - LGS ZOR
        // ================================================================
        for (let i = 0; i < 40; i++) Q["Üslü İfadeler"].push(() => {
            let t = rand(1, 15);

            if (t === 1) {
                // Çok adımlı üslü sadeleştirme
                let a = rand(2, 4), p = rand(3, 7), q2 = rand(2, 5);
                // a^(p+q) + a^(p+q) + ... (a adet) = a^(p+q+1)
                // Soru: a^(p+q) * a tane toplamı
                let sum = a; // a tane a^(p+q) = a^1 * a^(p+q) = a^(p+q+1)
                let ans = p + q2 + 1;
                let cor = `${a}<sup>${ans}</sup>`;
                let opts = shuffle([cor, `${a}<sup>${p + q2}</sup>`, `${a}<sup>${(p + q2) * 2}</sup>`, `${a * a}<sup>${p + q2}</sup>`]);
                return { q: `<b>${a}<sup>${p + q2}</sup> + ${a}<sup>${p + q2}</sup> + ... </b> toplamında <b>${a} tane</b> terim var. Bu toplam aşağıdakilerden hangisine eşittir?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 2) {
                // 2^n - 2^(n-1) = 2^(n-1)
                let n = rand(8, 20);
                let cor = `2<sup>${n - 1}</sup>`;
                let opts = shuffle([cor, `2<sup>${n}</sup>`, `2<sup>${n - 2}</sup>`, `2<sup>1</sup>`]);
                return { q: `<b>2<sup>${n}</sup> − 2<sup>${n - 1}</sup></b> işleminin sonucu aşağıdakilerden hangisidir?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 3) {
                // (2^a * 4^b * 8^c) = 2^?
                let a = rand(2, 6), b = rand(1, 5), c = rand(1, 4);
                let ans = a + 2 * b + 3 * c;
                let cor = `2<sup>${ans}</sup>`;
                let opts = shuffle([cor, `2<sup>${a + b + c}</sup>`, `2<sup>${a * b * c}</sup>`, `2<sup>${ans + 1}</sup>`]);
                return { q: `<b>2<sup>${a}</sup> × 4<sup>${b}</sup> × 8<sup>${c}</sup></b> ifadesi 2'nin kaçıncı kuvvetine eşittir?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 4) {
                // 5^n * 2^n = 10^n, buradan faydalanarak
                let n = rand(3, 8);
                let extra2 = rand(1, 4);
                // 5^n * 2^(n+extra) = 10^n * 2^extra
                let cor = `${Math.pow(2, extra2)} × 10<sup>${n}</sup>`;
                let opts = shuffle([cor, `10<sup>${n + extra2}</sup>`, `5<sup>${n}</sup> × 2<sup>${extra2}</sup>`, `10<sup>${n}</sup>`]);
                return { q: `<b>5<sup>${n}</sup> × 2<sup>${n + extra2}</sup></b> ifadesinin sonucu aşağıdakilerden hangisidir?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 5) {
                // Birler basamağı - çok adımlı
                let base = randArr([3, 7, 8, 13, 17]);
                let p = rand(50, 200);
                let cycle = { 3: [3, 9, 7, 1], 7: [7, 9, 3, 1], 8: [8, 4, 2, 6], 13: [3, 9, 7, 1], 17: [7, 9, 3, 1] };
                let c = cycle[base];
                let ans = c[(p - 1) % 4];
                let opts = makeDist(ans);
                return { q: `<b>${base}<sup>${p}</sup></b> sayısının <b>birler basamağındaki</b> rakam kaçtır?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Üslü İfadeler" };
            }
            if (t === 6) {
                // 3^(2n+1) - 3^(2n) = 2 * 3^(2n)
                let n = rand(3, 10);
                let exp = 2 * n;
                let cor = `2 × 3<sup>${exp}</sup>`;
                let opts = shuffle([cor, `3<sup>${exp + 1}</sup>`, `3<sup>${exp}</sup>`, `6<sup>${exp}</sup>`]);
                return { q: `<b>3<sup>${exp + 1}</sup> − 3<sup>${exp}</sup></b> ifadesi aşağıdakilerden hangisine eşittir?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 7) {
                // 6^n = 2^n * 3^n → Karşılaştırma
                let n = rand(3, 8);
                // 2^(3n) ile 8^n eşit → hangisi büyük: 2^(3n+1) vs 3*8^n
                let a1 = `2<sup>${3 * n + 1}</sup>`;
                let a2 = `3 × 8<sup>${n}</sup>`;
                // 2^(3n+1) = 2 * 8^n, 3 * 8^n > 2 * 8^n
                let cor = a2;
                let opts = shuffle([a1, a2, "Eşittirler", "Karşılaştırılamaz"]);
                return { q: `<b>${a1}</b> ile <b>${a2}</b> sayılarından hangisi daha büyüktür?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 8) {
                // (a^m)^n ÷ a^(m*n-k) = a^k
                let a = rand(2, 5), m = rand(2, 4), n = rand(2, 4), k = rand(1, 5);
                let topExp = m * n;
                let cor = `${a}<sup>${k}</sup>`;
                let val = Math.pow(a, k);
                let opts = shuffle([val.toString(), (val * a).toString(), (val + a).toString(), Math.pow(a, k + 1).toString()]);
                return { q: `<b>(${a}<sup>${m}</sup>)<sup>${n}</sup> ÷ ${a}<sup>${topExp - k}</sup></b> işleminin sonucu kaçtır?`, a: opts, c: opts.indexOf(val.toString()), cat: "Üslü İfadeler" };
            }
            if (t === 9) {
                // 2^10 + 2^10 = 2^11 tarzı - genelleştirilmiş
                let base = rand(2, 5), n = rand(5, 12);
                // base adet base^n = base^(n+1)
                let cor = `${base}<sup>${n + 1}</sup>`;
                let val = Math.pow(base, n + 1);
                let opts = shuffle([cor, `${base}<sup>${n * 2}</sup>`, `${base * base}<sup>${n}</sup>`, `${base}<sup>${n + 2}</sup>`]);
                return { q: `<b>${base}<sup>${n}</sup></b> sayısının <b>${base} katı</b> aşağıdakilerden hangisidir?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 10) {
                // Negatif üslü karmaşık
                let a = rand(2, 5), p = rand(2, 4);
                let val = Math.pow(a, p);
                // a^(-p) + a^(-p) = 2/a^p
                let cor = `2/${val}`;
                let opts = shuffle([cor, `1/${val}`, `1/${val * 2}`, `${val}/2`]);
                return { q: `<b>${a}<sup>-${p}</sup> + ${a}<sup>-${p}</sup></b> işleminin sonucu kaçtır?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 11) {
                // 9^n vs 3^(2n+1) karşılaştırma → 3^(2n+1) = 3 * 9^n > 9^n
                let n = rand(3, 8);
                let cor = `3<sup>${2 * n + 1}</sup>`;
                let opts = shuffle([cor, `9<sup>${n}</sup>`, "Eşittirler", `3<sup>${2 * n - 1}</sup>`]);
                return { q: `<b>9<sup>${n}</sup></b> ile <b>3<sup>${2 * n + 1}</sup></b> sayılarından hangisi daha büyüktür?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 12) {
                // 4^n + 4^n + 4^n + 4^n = 4^(n+1)
                let n = rand(4, 12);
                let cor = `4<sup>${n + 1}</sup>`;
                let opts = shuffle([cor, `16<sup>${n}</sup>`, `4<sup>${2 * n}</sup>`, `4<sup>${n + 2}</sup>`]);
                return { q: `<b>4<sup>${n}</sup> + 4<sup>${n}</sup> + 4<sup>${n}</sup> + 4<sup>${n}</sup></b> toplamı aşağıdakilerden hangisine eşittir?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
            }
            if (t === 13) {
                // 2^a = 3 ise 2^(3a) = ?  → (2^a)^3 = 27
                let k = rand(2, 5);
                let base = rand(2, 4);
                let equals = rand(3, 7);
                let mult = rand(2, 4);
                let ans = Math.pow(equals, mult);
                let opts = makeDist(ans);
                return { q: `<b>${base}<sup>a</sup> = ${equals}</b> olduğuna göre <b>${base}<sup>${mult}a</sup></b> kaçtır?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Üslü İfadeler" };
            }
            if (t === 14) {
                // (2^n + 2^n) / 2^(n-1) = ?  → 2*2^n / 2^(n-1) = 2^(n+1)/2^(n-1) = 2^2 = 4
                let n = rand(5, 15);
                let ans = 4;
                let opts = makeDist(ans);
                return { q: `<b>(2<sup>${n}</sup> + 2<sup>${n}</sup>) ÷ 2<sup>${n - 1}</sup></b> işleminin sonucu kaçtır?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Üslü İfadeler" };
            }
            if (t === 15) {
                // 25^n * 4^n = 100^n → 100^n sonundaki 0 sayısı = 2n
                let n = rand(3, 8);
                let ans = 2 * n;
                let opts = makeDist(ans);
                return { q: `<b>25<sup>${n}</sup> × 4<sup>${n}</sup></b> sayısının sonunda kaç tane sıfır vardır?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Üslü İfadeler" };
            }
            // Default hard
            let n = rand(4, 10);
            let ans = 3;
            // (3^(n+2) - 3^n) / (3^n * 8) = (3^n(9-1))/(3^n*8) = 1
            let cor = "1";
            let opts = shuffle(["1", "3", "8", "9"]);
            return { q: `<b>(3<sup>${n + 2}</sup> − 3<sup>${n}</sup>) ÷ (8 × 3<sup>${n}</sup>)</b> işleminin sonucu kaçtır?`, a: opts, c: opts.indexOf(cor), cat: "Üslü İfadeler" };
        });

        // ================================================================
        //  2. KAREKÖKLÜ İFADELER - LGS ZOR
        // ================================================================
        for (let i = 0; i < 40; i++) Q["Kareköklü İfadeler"].push(() => {
            let t = rand(1, 14);

            if (t === 1) {
                // √(a²+2ab+b²) + √(a²-2ab+b²) = |a+b| + |a-b|
                let a = rand(3, 10), b = rand(1, a - 1);
                let inside1 = (a + b) * (a + b), inside2 = (a - b) * (a - b);
                let ans = (a + b) + (a - b); // = 2a
                let opts = makeDist(ans);
                return { q: `<b>√${inside1} + √${inside2}</b> işleminin sonucu kaçtır?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Kareköklü İfadeler" };
            }
            if (t === 2) {
                // Ardışık tam kareler arası sayı adedi
                let n = rand(10, 25);
                let sq1 = n * n, sq2 = (n + 1) * (n + 1);
                let between = sq2 - sq1 - 1; // = 2n
                let opts = makeDist(between);
                return { q: `<b>${sq1}</b> ile <b>${sq2}</b> arasında (bu sayılar hariç) kaç tam sayı vardır?`, a: opts, c: opts.indexOf(between.toString()), cat: "Kareköklü İfadeler" };
            }
            if (t === 3) {
                // Karekök denklem: √(x+a) = b → x = b²-a
                let b = rand(3, 9), a = rand(5, 30);
                let x = b * b - a;
                if (x < 0) { a = rand(1, b * b - 1); x = b * b - a; }
                let opts = makeDist(x);
                return { q: `<b>√(x + ${a}) = ${b}</b> denkleminde <b>x</b> kaçtır?`, a: opts, c: opts.indexOf(x.toString()), cat: "Kareköklü İfadeler" };
            }
            if (t === 4) {
                // √a * √b + √(a*b) = 2√(ab)
                let a = rand(2, 8), b = rand(2, 8);
                let prod = a * b;
                // Eğer ab tam kare ise güzel sonuç verir
                let val = 2 * Math.sqrt(prod);
                // Tam kare yapalım
                let k = rand(2, 5);
                a = k; b = k; prod = k * k;
                val = 2 * k;
                let opts = makeDist(val);
                return { q: `<b>√${a} × √${b} + √${prod}</b> işleminin sonucu kaçtır?`, a: opts, c: opts.indexOf(val.toString()), cat: "Kareköklü İfadeler" };
            }
            if (t === 5) {
                // n² < x < (n+1)² olan tam sayı sayısı
                let n = rand(7, 20);
                let count = 2 * n; // (n+1)² - n² - 1 = 2n
                let opts = makeDist(count);
                return { q: `<b>${n * n}</b> ile <b>${(n + 1) * (n + 1)}</b> arasında (bu sayılar hariç) kaç doğal sayı vardır?`, a: opts, c: opts.indexOf(count.toString()), cat: "Kareköklü İfadeler" };
            }
            if (t === 6) {
                // Payda rasyonelleştirme: a/(√b - √c)
                let b = rand(5, 15), c = rand(2, b - 1);
                while (!Number.isInteger(Math.sqrt(b)) || !Number.isInteger(Math.sqrt(c))) {
                    b = randArr([4, 9, 16, 25, 36]);
                    c = randArr([1, 4, 9, 16]);
                    if (b <= c) b = 25;
                }
                let sqrtB = Math.sqrt(b), sqrtC = Math.sqrt(c);
                let diff = b - c;
                // k / (√b - √c) = k(√b + √c) / (b-c)

        });

        // ================================================================
        //  8. DÖNÜŞÜM GEOMETRİSİ - LGS ZOR
        // ================================================================
        for (let i = 0; i < 40; i++) Q["Dönüşüm Geometrisi"].push(() => {

                // Öteleme + yansıma

                let dx = rand(2, 5), dy = rand(2, 5);
                // Önce (dx,dy) öteleme → (x+dx, y+dy)

                let fx = x + dx, fy = -(y + dy);
                let cor = `(${fx}, ${fy})`;
                let opts = shuffle([cor, `(${x + dx}, ${y + dy})`, `(${-(x + dx)}, ${y + dy})`, `(${fx}, ${-fy})`]);
                return { q: `<b>A(${x}, ${y})</b> noktası <b>(${dx}, ${dy})</b> ile ötelenip sonra <b>x eksenine</b> göre yansıtılırsa son koordinatı ne olur?`, a: opts, c: opts.indexOf(cor), cat: "Dönüşüm Geometrisi" };

                let d2 = (x + y) * (x + y) + (x - y) * (x - y); // = 2(x²+y²)
                // Basit: mesafe² = (x-(-y))² + (y-x)² = (x+y)² + (y-x)²
                let dist2 = (x + y) * (x + y) + (y - x) * (y - x);
                let cor = `√${dist2}`;
                let opts = shuffle([cor, `${x + y}`, `√${x * x + y * y}`, `${Math.abs(x - y)}`]);
                return { q: `<b>A(${x}, ${y})</b> noktası orijin etrafında 90° döndürülünce <b>A'(${-y}, ${x})</b> olur. <b>AA'</b> uzunluğu kaç birimdir?`, a: opts, c: opts.indexOf(cor), cat: "Dönüşüm Geometrisi" };
            }
            if (t === 4) {
                // y=x'e göre yansıma + öteleme

                // y=x yansıma → (y, x)
                let dx = rand(-3, 3), dy = rand(-3, 3);
                let fx = y + dx, fy = x + dy;
                let cor = `(${fx}, ${fy})`;
                let opts = shuffle([cor, `(${x + dx}, ${y + dy})`, `(${y}, ${x})`, `(${fy}, ${fx})`]);
                return { q: `<b>A(${x}, ${y})</b> önce <b>y = x</b> doğrusuna göre yansıtılıp sonra <b>(${dx}, ${dy})</b> ile ötelenirse son koordinatı ne olur?`, a: opts, c: opts.indexOf(cor), cat: "Dönüşüm Geometrisi" };
            }
            if (t === 5) {
                // İki paralel doğruya art arda yansıma = öteleme

                // Dönme simetrisi derecesi

        // ================================================================
        //  9. OLASILIK - LGS ZOR
        // ================================================================
        for (let i = 0; i < 40; i++) Q["Olasılık"].push(() => {
            let t = rand(1, 12);

            if (t === 1) {

                // Koşullu olasılık - torba

                let num = r * (r - 1);

                let g = gcd(num, den);
                let cor = `${num / g}/${den / g}`;
                let opts = shuffle([cor, `${r}/${total}`, `${r * r}/${total * total}`, `${r - 1}/${total - 1}`]);
                return { q: `<b>${r} kırmızı</b>, <b>${b} mavi</b> top olan torbadan <b>iade etmeden</b> çekilen 2 topun da kırmızı olma olasılığı nedir?`, a: opts, c: opts.indexOf(cor), cat: "Olasılık" };

                let p2mavi_num = b * (b - 1);
                let p2mavi_den = total * (total - 1);
                let pEnAz_num = p2mavi_den - p2mavi_num;
                let pEnAz_den = p2mavi_den;
                let g = gcd(pEnAz_num, pEnAz_den);

                let opts = shuffle([cor, `${r}/${total}`, `${p2mavi_num / gcd(p2mavi_num, p2mavi_den)}/${p2mavi_den / gcd(p2mavi_num, p2mavi_den)}`, `1`]);
                return { q: `<b>${r} kırmızı</b>, <b>${b} mavi</b> toptan iade etmeden 2 top çekildiğinde <b>en az 1'inin kırmızı</b> olma olasılığı nedir?`, a: opts, c: opts.indexOf(cor), cat: "Olasılık" };

                return { q: `3 madeni para aynı anda atıldığında <b>tam 2 tanesinin tura</b> gelme olasılığı nedir?`, a: opts, c: opts.indexOf(cor), cat: "Olasılık" };

                let opts = shuffle(["1/3", "1/2", "1/6", "2/3"]);
                return { q: `Bir zar atıldığında gelen sayının hem <b>asal</b> hem <b>tek</b> olma olasılığı nedir?`, a: opts, c: opts.indexOf(cor), cat: "Olasılık" };
            }
            if (t === 6) {
                // İki zar çarpımı tek
                // Her ikisi de tek olmalı: 3*3=9 → 9/36 = 1/4

                let opts = shuffle(["1/4", "1/2", "3/4", "1/6"]);
                return { q: `İki zar atıldığında çarpımlarının <b>tek sayı</b> olma olasılığı nedir?`, a: opts, c: opts.indexOf(cor), cat: "Olasılık" };

                // İlk iki harf yan yana = 2! * (n-1)!
                let yanyana = 2 * factorial(n - 1);
                let prob_num = yanyana, prob_den = totalPerm;
                let g = gcd(prob_num, prob_den);

                let opts = shuffle([cor, `1/${n}`, `2/${n}`, `${prob_num / g + 1}/${prob_den / g}`]);
                return { q: `"<b>${word}</b>" kelimesinin harfleri rastgele sıralanıyor. İlk iki harfin (<b>${word[0]}</b> ve <b>${word[1]}</b>) yan yana gelme olasılığı nedir?`, a: opts, c: opts.indexOf(cor), cat: "Olasılık" };

                return { q: `A olayının olasılığı <b>${p1_num}/${p1_den}</b>, B olayının olasılığı <b>${p2_num}/${p2_den}</b> dir. Bağımsız A ve B olaylarının <b>ikisinin birden</b> gerçekleşme olasılığı nedir?`, a: opts, c: opts.indexOf(cor), cat: "Olasılık" };

                let g = gcd(count, 36);

        // ================================================================
        //  10. VERİ ANALİZİ - LGS ZOR
        // ================================================================
        for (let i = 0; i < 40; i++) Q["Veri Analizi"].push(() => {

                let ans = avg;

                    avg = sum / n;
                    ans = avg;

                return { q: `Sıralı veri: <b>${vals.join(', ')}</b>. Çeyrekler arası açıklık (Q3 - Q1) kaçtır?`, a: opts, c: opts.indexOf(iqr.toString()), cat: "Veri Analizi" };

                let opts = makeDist(combined);
                return { q: `<b>${n1}</b> kişilik A sınıfının ortalaması <b>${avg1}</b>, <b>${n2}</b> kişilik B sınıfının ortalaması <b>${avg2}</b> ise iki sınıfın <b>genel ortalaması</b> kaçtır?`, a: opts, c: opts.indexOf(combined.toString()), cat: "Veri Analizi" };
            }
            if (t === 8) {
                // Frekans tablosu + ağırlıklı ortalama
                let vals = [rand(40, 55), rand(56, 70), rand(71, 85), rand(86, 100)];
                let freqs = [rand(3, 10), rand(3, 10), rand(3, 10), rand(3, 10)];
                let sum = 0, totalF = 0;
                for (let j = 0; j < 4; j++) { sum += vals[j] * freqs[j]; totalF += freqs[j]; }
                let avg = Math.round(sum / totalF * 10) / 10;
                let desc = vals.map((v, j) => `${v}→${freqs[j]} kişi`).join(', ');
                let opts = makeDist(avg);
                return { q: `Frekans: <b>${desc}</b>. Ortalama kaçtır?`, a: opts, c: opts.indexOf(avg.toString()), cat: "Veri Analizi" };
            }
            if (t === 9) {
                // Sıralı veriden mod, medyan, ortalama karşılaştırması
                let mode = rand(50, 80);
                let vals = [mode - 15, mode - 5, mode, mode, mode, mode + 10, mode + 20];
                let sum = vals.reduce((a, b) => a + b, 0);
                let avg = Math.round(sum / 7 * 10) / 10;
                let median = vals[3]; // = mode
                // Hangisi en büyük?
                let biggest = Math.max(avg, median, mode);
                let corLabel = biggest === avg ? `Ortalama (${avg})` : biggest === mode ? `Mod (${mode})` : `Medyan (${median})`;
                let opts = shuffle([`Ortalama (${avg})`, `Mod (${mode})`, `Medyan (${median})`, "Hepsi eşit"]);
                return { q: `Veri: <b>${vals.join(', ')}</b>. Aşağıdakilerden hangisi en büyüktür?`, a: opts, c: opts.indexOf(corLabel), cat: "Veri Analizi" };
            }
            if (t === 10) {
                // Standart sapma yorumu
                let cor = "Veriler ortalamaya daha yakındır";
                let opts = shuffle([cor, "Ortalama daha büyüktür", "Medyan daha küçüktür", "Mod yoktur"]);
                return { q: `Bir veri setinin standart sapması <b>küçüldüğünde</b> bu ne anlama gelir?`, a: opts, c: opts.indexOf(cor), cat: "Veri Analizi" };
            }
            let vals = [rand(40, 60), rand(60, 80), rand(80, 100)];
            let avg = Math.round(vals.reduce((a, b) => a + b, 0) / 3);
            let opts = makeDist(avg);
            return { q: `<b>${vals.join(', ')}</b> ortalaması kaç?`, a: opts, c: opts.indexOf(avg.toString()), cat: "Veri Analizi" };
        });

        // ================================================================
        //  11. MANTIK VE PROBLEM - LGS ZOR
        // ================================================================
        for (let i = 0; i < 40; i++) Q["Mantık ve Problem"].push(() => {
            let t = rand(1, 14);

            if (t === 1) {
                // Havuz + iki musluk + sızıntı
                let fill = rand(4, 8), drain = rand(10, 20);
                // Net dolma hızı = 1/fill - 1/drain = (drain-fill)/(fill*drain)
                let num = fill * drain;
                let den = drain - fill;
                // Tam sayı olsun
                num = den * rand(2, 6);
                let ans = num / den;
                let opts = makeDist(ans);
                return { q: `Bir havuzu <b>${fill} saatte</b> dolduran musluk ve <b>${drain} saatte</b> boşaltan delik birlikte açık. <b>${num} litrelik</b> havuz kaç saatte dolar?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 2) {
                // Yaş problemi - 3 kişi
                let a = rand(5, 10), b = rand(12, 18), c = rand(35, 50);
                let sum = a + b + c;
                let yilSonra = rand(3, 8);
                let newSum = sum + 3 * yilSonra;
                let opts = makeDist(newSum);
                return { q: `Üç kardeşin yaşları <b>${a}, ${b}, ${c}</b>'tir. <b>${yilSonra} yıl sonra</b> yaşları toplamı kaç olur?`, a: opts, c: opts.indexOf(newSum.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 3) {
                // Saat problemi - ileri/geri kalan saat
                let minutesPerHour = rand(2, 8);
                let hours = rand(6, 24);
                let totalDrift = minutesPerHour * hours;
                let opts = makeDist(totalDrift);
                return { q: `Saatte <b>${minutesPerHour} dakika</b> geri kalan bir saat <b>${hours} saat</b> sonra gerçek saatten kaç dakika geri kalır?`, a: opts, c: opts.indexOf(totalDrift.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 4) {
                // EBOB uygulaması - eşit bölme
                let a = rand(24, 120), b = rand(24, 120);
                while (gcd(a, b) < 4) { a = rand(24, 120); b = rand(24, 120); }
                let g = gcd(a, b);
                let opts = makeDist(g);
                return { q: `<b>${a}</b> ve <b>${b}</b> metrelik iki kumaş eşit parçalara kesilecek. Her parça en uzun kaç metre olabilir? (Artan kumaş olmamalı)`, a: opts, c: opts.indexOf(g.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 5) {
                // EKOK uygulaması - aynı anda çalma
                let a = rand(3, 12), b = rand(3, 12), c = rand(3, 12);
                let l = lcm(lcm(a, b), c);
                let opts = makeDist(l);
                return { q: `Üç zil sırasıyla <b>${a}, ${b}, ${c}</b> dakikada bir çalıyor. İlk kez birlikte çaldıktan sonra tekrar birlikte kaç dakika sonra çalar?`, a: opts, c: opts.indexOf(l.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 6) {
                // Kâr-zarar çok adımlı
                let maliyet = rand(50, 200);
                let karOrani = rand(20, 60);
                let satisFiyati = maliyet * (100 + karOrani) / 100;
                let indirimOrani = rand(10, 30);
                let indirimliFiyat = satisFiyati * (100 - indirimOrani) / 100;
                let netKar = Math.round((indirimliFiyat - maliyet) * 100) / 100;
                let opts = makeDist(netKar);
                return { q: `<b>${maliyet} TL</b>'ye alınan ürün <b>%${karOrani} kârla</b> fiyatlandırılıp sonra <b>%${indirimOrani} indirim</b> yapılıyor. Net kâr/zarar kaç TL'dir?`, a: opts, c: opts.indexOf(netKar.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 7) {
                // Hız problemi - nehirde tekne
                let tekneHiz = rand(15, 30), nehirHiz = rand(3, 8);
                let mesafe = rand(50, 200);
                // Akıntı yönünde: tekne + nehir, karşı yönde: tekne - nehir
                let sure1 = mesafe / (tekneHiz + nehirHiz);
                let sure2 = mesafe / (tekneHiz - nehirHiz);
                // Toplam süre
                mesafe = (tekneHiz + nehirHiz) * (tekneHiz - nehirHiz); // tam sayı süre olsun
                sure1 = mesafe / (tekneHiz + nehirHiz);
                sure2 = mesafe / (tekneHiz - nehirHiz);
                let total = sure1 + sure2;
                let opts = makeDist(total);
                return { q: `Durgun sudaki hızı <b>${tekneHiz} km/sa</b> olan tekne, akıntı hızı <b>${nehirHiz} km/sa</b> olan nehirde <b>${mesafe} km</b>'lik mesafeyi gidip dönüyor. Toplam süre kaç saattir?`, a: opts, c: opts.indexOf(total.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 8) {
                // Tren problemi - aynı yönde geçme
                let L1 = rand(100, 300), L2 = rand(100, 300);
                let v1 = rand(60, 120), v2 = rand(30, v1 - 10);
                // Hızlı trenin yavaşı geçme süresi = (L1+L2) / (v1-v2) [m/s veya km/sa düzeltmesi]
                let fark = v1 - v2;
                let totalL = L1 + L2;
                // totalL / fark saniye (m/s ise) → basitleştir
                totalL = fark * rand(5, 20); // tam sayı olsun
                L1 = rand(Math.floor(totalL / 3), Math.floor(2 * totalL / 3));
                L2 = totalL - L1;
                let sure = totalL / fark;
                let opts = makeDist(sure);
                return { q: `Uzunlukları <b>${L1} m</b> ve <b>${L2} m</b> olan iki tren aynı yönde, hızları <b>${v1} m/s</b> ve <b>${v2} m/s</b>. Hızlı tren yavaşı kaç saniyede geçer?`, a: opts, c: opts.indexOf(sure.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 9) {
                // Mantık bulmacası
                let total = rand(30, 60);
                let kedi = rand(10, total - 20), kopek = rand(10, total - kedi - 5);
                let kus = total - kedi - kopek;
                let opts = makeDist(kus);
                return { q: `Bir pet shopta toplam <b>${total}</b> hayvan var. Kediler köpeklerden <b>${kedi - kopek > 0 ? kedi - kopek + ' fazla' : kopek - kedi + ' az'}</b> ve kuş sayısı <b>${kus}</b>'tir. Kedi sayısı kaçtır?`, a: opts, c: opts.indexOf(kedi.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 10) {
                // Dişli çark
                let d1 = rand(12, 36), d2 = rand(12, 36);
                while (d1 === d2) d2 = rand(12, 36);
                // 1. çark n tur → 2. çark n*d1/d2 tur
                let n = rand(3, 10);
                let g = gcd(d1 * n, d2);
                let turNum = d1 * n;
                let turDen = d2;
                let gg = gcd(turNum, turDen);
                let ansStr = gg === turDen ? `${turNum / turDen}` : `${turNum / gg}/${turDen / gg}`;
                // Tam sayı olsun
                d2 = rand(2, 5) * rand(2, 4);
                d1 = d2 * rand(2, 4);
                n = rand(2, 6);
                let ans = d1 * n / d2;
                let opts2 = makeDist(ans);
                return { q: `<b>${d1}</b> dişli çark <b>${d2}</b> dişli çarkla bağlı. Büyük çark <b>${n} tur</b> dönerse küçük çark kaç tur döner?`, a: opts2, c: opts2.indexOf(ans.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 11) {
                // Bölünebilme kuralı - son 2 basamak
                let hundreds = rand(1, 9), tens = rand(0, 9);
                // 4'e bölünme: son 2 basamak 4'e bölünmeli
                let base = hundreds * 100 + tens * 10;
                let found = [];
                for (let d = 0; d <= 9; d++) if ((tens * 10 + d) % 4 === 0) found.push(d);
                let ans = found.length;
                let opts = makeDist(ans);
                return { q: `<b>${hundreds}${tens}▢</b> sayısı <b>4</b>'e tam bölünebilmesi için ▢ yerine kaç farklı rakam gelebilir?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 12) {
                // Ardışık tam sayılar problemleri
                let n = rand(3, 7);
                let sum = rand(30, 100);
                // n ardışık: n*a + n*(n-1)/2 = sum → a = (sum - n*(n-1)/2) / n
                let correction = n * (n - 1) / 2;
                let remainder = sum - correction;
                // Tam sayı olsun
                sum = n * rand(5, 20) + correction;
                remainder = sum - correction;
                let first = remainder / n;
                let last = first + n - 1;
                let opts = makeDist(last);
                return { q: `<b>${n}</b> ardışık tam sayının toplamı <b>${sum}</b> ise <b>en büyüğü</b> kaçtır?`, a: opts, c: opts.indexOf(last.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 13) {
                // Bölen sayısı uygulaması
                let candidates = [60, 72, 84, 90, 96, 108, 120, 144, 168, 180, 240, 360];
                let n = randArr(candidates);
                let dc = divisorCount(n);
                let opts = makeDist(dc);
                return { q: `<b>${n}</b> sayısının pozitif bölen sayısı kaçtır?`, a: opts, c: opts.indexOf(dc.toString()), cat: "Mantık ve Problem" };
            }
            if (t === 14) {
                // Modüler aritmetik: Son rakam
                let a = rand(2, 9), b = rand(2, 9);
                let prod = a * b;
                let lastDigit = prod % 10;
                let power = rand(10, 50);
                // (a*b)^power'ın son rakamı
                let cycle = [];
                let cur = lastDigit;
                do { cycle.push(cur); cur = (cur * lastDigit) % 10; } while (cur !== lastDigit && cycle.length < 5);
                let ans = cycle[(power - 1) % cycle.length];
                let opts = makeDist(ans);
                return { q: `<b>(${a} × ${b})<sup>${power}</sup></b> sayısının birler basamağı kaçtır?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Mantık ve Problem" };
            }
            let a = rand(12, 48), b = rand(12, 48);
            let ans = gcd(a, b);
            let opts = makeDist(ans);
            return { q: `EBOB(${a}, ${b}) kaçtır?`, a: opts, c: opts.indexOf(ans.toString()), cat: "Mantık ve Problem" };
        });


        // ================================================================
        //  TEST YÖNETİMİ
        // ================================================================
        let usedPool = new Set();

        function getRandomTest() {
            let cats = Object.keys(Q);
            let pool = [];
            for (let cat of cats) for (let i = 0; i < Q[cat].length; i++) pool.push({ cat, i, fn: Q[cat][i] });

            let picks = [];
            let shuffledCats = shuffle(cats);

            // Her kategoriden en az 1 (mümkünse)
            for (let cat of shuffledCats) {
                if (picks.length >= 10) break;
                let items = pool.filter(p => p.cat === cat && !usedPool.has(p.cat + p.i));
                if (items.length > 0) {
                    let pick = randArr(items);
                    picks.push(pick);
                    usedPool.add(pick.cat + pick.i);
                }
            }

            // Kalan slotları rastgele doldur
            let remaining = pool.filter(p => !usedPool.has(p.cat + p.i));
            remaining = shuffle(remaining);
            while (picks.length < 10 && remaining.length > 0) {
                picks.push(remaining.shift());
                usedPool.add(picks[picks.length - 1].cat + picks[picks.length - 1].i);
            }

            if (picks.length < 10) {
                usedPool = new Set();
                return getRandomTest();
            }

            return shuffle(picks).map(p => uniqueQ(p.fn));
        }

        let questions = [], cur = 0, score = 0, selected = null, locked = false;

        function render() {
            if (!questions.length || cur >= 10) { finish(); return; }
            locked = false; selected = null;
            let q = questions[cur];
            document.getElementById('q-idx').innerHTML = `SORU ${String(cur + 1).padStart(2, '0')} <span class="q-cat">${q.cat || ''}</span>`;
            document.getElementById('q-text').innerHTML = q.q;
            document.getElementById('bar').style.width = `${(cur / 10) * 100}%`;
            let oc = document.getElementById('opts');
            oc.innerHTML = '';
            let order = [...Array(q.a.length).keys()].sort(() => Math.random() - 0.5);
            order.forEach(i => {
                let div = document.createElement('div');
                div.className = 'opt';
                div.innerHTML = `<b>${String.fromCharCode(65 + order.indexOf(i))}</b> <span>${q.a[i]}</span>`;
                div.onclick = () => {
                    if (!locked) {
                        selected = i;
                        document.querySelectorAll('.opt').forEach(x => x.classList.remove('active'));
                        div.classList.add('active');
                        document.getElementById('btn').disabled = false;
                    }
                };
                div.dataset.idx = i;
                oc.appendChild(div);
            });
            document.getElementById('btn').innerText = "CEVABI KONTROL ET";
            document.getElementById('btn').disabled = true;
            document.getElementById('score').innerText = score;
        }

        function action() {
            let btn = document.getElementById('btn');
            if (!locked) {
                locked = true;
                let correct = questions[cur].c;
                document.querySelectorAll('.opt').forEach(o => {
                    let idx = parseInt(o.dataset.idx);
                    if (idx === correct) o.classList.add('correct');
                    else if (idx === selected) o.classList.add('wrong');
                });
                if (selected === correct) { score += 10; document.getElementById('score').innerText = score; }
                btn.innerText = "DEVAM ET →";
            } else { cur++; render(); }
        }

        function finish() {
            document.getElementById('bar').style.width = '100%';
            let emoji = score === 100 ? "🏆" : score >= 70 ? "🔥" : score >= 40 ? "📚" : "💪";
            let msg = score === 100 ? "Olağanüstü! LGS'de derece potansiyelin var!" :
                score >= 70 ? "Çok iyi! Bu seviyeyi korursan LGS'de başarılı olursun." :
                    score >= 40 ? "Orta seviye. Zayıf olduğun konulara daha çok çalışmalısın." :
                        "Bu zorluk seviyesi seni geliştirecek. Tekrar dene!";
            document.getElementById('game').innerHTML = `
                <div style="text-align:center; padding: 40px 0;">
                    <div style="font-size:4rem; margin-bottom:20px;">${emoji}</div>
                    <h1 style="font-size:5rem; color:var(--accent); margin-bottom:10px;">${score}</h1>
                    <p style="letter-spacing:5px; color:#666; font-weight:700;">LGS SEVİYE SKORU</p>
                    <div style="margin:30px 0; font-size:1.15rem; line-height:1.8; color:#aaa;">${msg}</div>
                    <button class="btn" onclick="nextTest()">YENİ TEST</button>
                    <button class="btn" style="margin-top:10px; background:#333; color:#fff;" onclick="location.reload()">SİSTEMİ SIFIRLA</button>
                </div>`;
        }

        function nextTest() {
            questions = getRandomTest();
            cur = 0; score = 0;
            document.getElementById('score').innerText = '0';
            document.getElementById('bar').style.width = '0%';
            document.getElementById('game').innerHTML = `
                <div class="q-tag" id="q-idx">SORU 01</div>
                <div class="q-text" id="q-text">Hazırlanıyor...</div>
                <div class="options" id="opts"></div>
                <button class="btn" id="btn" disabled onclick="action()">CEVABI KONTROL ET</button>`;
            render();
        }

        (() => { questions = getRandomTest(); render(); })();
    </script>
